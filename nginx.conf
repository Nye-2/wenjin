# Wenjin - Nginx Reverse Proxy Configuration
# Production deployment on port 2026

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Resolve Docker service names at runtime to avoid stale upstream IPs
    # after container recreation.
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name _;
        set $gateway_origin http://gateway:8001;
        set $frontend_origin http://frontend:3000;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Client body size for file uploads
        client_max_body_size 100M;
        client_body_buffer_size 128k;

        # Liveness endpoint for nginx itself
        location = /livez {
            access_log off;
            return 200 "alive\n";
            add_header Content-Type text/plain;
        }

        # Readiness endpoint proxied to gateway dependencies
        location = /readyz {
            access_log off;
            proxy_pass $gateway_origin/readyz;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health {
            access_log off;
            proxy_pass $gateway_origin/readyz;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Silence noisy browser default favicon lookup when no app icon exists.
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }

        # Block all legacy /uploads public paths.
        location /uploads/ {
            return 410;
        }

        # Gateway SSE endpoints - runs/workspace/task/subagent streams
        location ~ ^/api/(workspaces/[^/]+/events|tasks/[^/]+/stream|subagents/events|runs/stream|runs/[^/]+/stream|threads/[^/]+/runs/stream|threads/[^/]+/runs/[^/]+/(stream|join))$ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass $gateway_origin;
            proxy_http_version 1.1;

            # SSE/Streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            add_header X-Accel-Buffering "no" always;

            # Timeouts for long-running streams
            proxy_connect_timeout 60s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Long-running synchronous run wait/join endpoints
        location ~ ^/api/(runs/wait|threads/[^/]+/runs/wait)$ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass $gateway_origin;

            proxy_http_version 1.1;
            proxy_set_header Connection '';

            # Run wait can exceed default API timeout for long model calls.
            proxy_connect_timeout 60s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Expose gateway metrics directly (avoid frontend /login redirect path).
        location ^~ /metrics {
            access_log off;
            proxy_pass $gateway_origin/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            add_header X-Metrics-Proxy "gateway" always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Gateway API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass $gateway_origin;

            proxy_http_version 1.1;
            proxy_set_header Connection '';

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend - Next.js
        location / {
            limit_req zone=general burst=100 nodelay;

            proxy_pass $frontend_origin;
            proxy_http_version 1.1;

            # WebSocket support for Next.js HMR (dev) and future features
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Next.js static assets
        location /_next/static/ {
            proxy_pass $frontend_origin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Cache static assets
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
