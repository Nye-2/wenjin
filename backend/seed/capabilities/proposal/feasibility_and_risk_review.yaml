schema_version: capability.v2
id: feasibility_and_risk_review
workspace_type: proposal
enabled: true
display:
  name: 可行性与风险审查
  description: 审查创新性、可行性、资源匹配和风险缓释
  icon: file-pen
  color: blue
  order: 40
  entry_tier: primary
intent:
  description: 审查创新性、可行性、资源匹配和风险缓释
  trigger_phrases:
  - 可行性与风险审查
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 审查创新性、可行性、资源匹配和风险缓释
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要审查申报方案的创新性、可行性、资源匹配、评审风险和缓释策略。
  - 用户已有主稿、技术路线或项目方案，想在提交前做风险体检。
  not_for:
  - 还没有方案，只想从 idea 生成主稿，应转向 idea_to_proposal_package。
  - 只需要润色表达、突出亮点，应转向 proposal_polish_for_review。
  user_intents:
  - 可行性审查
  - 风险评估
  - 评审风险
  positive_examples:
  - 帮我审查这个申报书的可行性和评审风险。
  - 看看这个技术路线有什么资源和执行风险。
  - 从评审角度检查这版方案的风险点和补强建议。
  negative_examples:
  - 从零帮我写申请书。
  - 只把语言改得更像基金文本。
  - 简单解释一下可行性分析应该写什么。
  minimum_context:
    existing_materials_summary: required
    target_format: optional
    source_guidelines: optional
  ambiguity:
    overlaps_with:
    - technical_route_package
    - proposal_polish_for_review
    ask_user_when:
    - 用户同时要改写和审风险，但没有说明优先质量审查还是语言润色。
  clarification:
    ask_when_missing:
      existing_materials_summary: 你希望我审查当前 Prism 主稿，还是有项目方案材料需要补充？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让评审风险专家检查创新性、可行性和风险缓释路径。
    clarification_prefix: 可以，我先确认审查材料。
    lightweight_answer_hint: 单个风险点可以直接在 chat 里先判断。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      funding_program:
        type: string
        description: 基金/项目类别、指南方向或申报渠道。
      call_guideline:
        type: string
        description: 申报指南、评审标准和模板要求。
      review_criteria:
        type: string
        description: 评审指标或打分点。
      research_objectives:
        type: string
        description: 拟解决科学/技术问题与研究目标。
      technical_route:
        type: string
        description: 已有或期望的技术路线。
      budget_constraints:
        type: string
        description: 经费、周期、团队和资源限制。
      team_basis:
        type: string
        description: 团队前期基础、论文、专利、平台或数据积累。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: optional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- objective_method_metric_alignment
- review_criteria_explicitly_addressed
- feasibility_risk_mitigation_included
- milestones_and_deliverables_traceable
graph_template:
  phases:
  - name: step_01_review_critic
    tasks:
    - name: review_critic
      subagent_type: react
      skill_id: review-critic
      inputs:
        task_focus: 按真实评审人视角做高强度审查，输出分级问题和可执行修改清单。
        capability_name: 可行性与风险审查
        capability_goal: produce_workspace_review_package
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_grant_planner
    depends_on:
    - step_01_review_critic
    tasks:
    - name: grant_planner
      subagent_type: react
      skill_id: grant-planner
      inputs:
        task_focus: 把项目 idea 转成目标、任务、技术路线、指标、里程碑和风险控制。
        capability_name: 可行性与风险审查
        capability_goal: produce_workspace_review_package
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 可行性与风险评估.md
          doc_kind: review_report
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'Funder-rubric planning: problem, objectives, work packages, methods, metrics, feasibility, risk, and impact.'
    source_notes:
    - NSF-style merit-review logic where no local funder rubric is provided
    - User-provided call text remains authoritative
