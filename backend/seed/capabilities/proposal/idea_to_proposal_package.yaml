schema_version: capability.v2
id: idea_to_proposal_package
workspace_type: proposal
enabled: true
display:
  name: Idea 到申报书
  description: 根据项目 idea、指南和团队条件生成或更新申报书主稿
  icon: file-pen
  color: blue
  order: 10
  entry_tier: primary
intent:
  description: 根据项目 idea、指南和团队条件生成或更新申报书主稿
  trigger_phrases:
  - 写申报书
  - 生成项目申报书
  disambiguation: {}
mission:
  goal: produce_or_update_primary_document
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 根据项目 idea、指南和团队条件生成或更新申报书主稿
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户已有项目 idea、指南方向或团队条件，希望生成或更新申报书主稿。
  - 用户需要把研究目标、背景意义、技术路线和预期成果整合成完整申报材料。
  not_for:
  - 只需要背景意义论证，应转向 proposal_background_pack。
  - 只需要技术路线和实验方案，应转向 technical_route_package。
  user_intents:
  - 写申报书
  - 基金申请初稿
  - 项目申请材料
  positive_examples:
  - 根据这个项目 idea 帮我写基金申报书初稿。
  - 按这个指南把项目申请材料搭起来。
  negative_examples:
  - 先帮我找这个方向的政策和研究背景。
  - 只帮我设计技术路线图。
  minimum_context:
    topic: required
    target_format: optional
    source_guidelines: optional
  ambiguity:
    overlaps_with:
    - proposal_background_pack
    - technical_route_package
    - feasibility_and_risk_review
    ask_user_when:
    - 用户只说做项目申请，但没有说明先写主稿还是先补背景/路线。
  clarification:
    ask_when_missing:
      topic: 你的项目 idea 或申请方向是什么？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让申报书团队把项目 idea 转成主稿结构和可审阅内容。
    clarification_prefix: 可以，我先确认项目方向。
    lightweight_answer_hint: 单个研究目标或标题可先在 chat 里打磨。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      funding_program:
        type: string
        description: 基金/项目类别、指南方向或申报渠道。
      call_guideline:
        type: string
        description: 申报指南、评审标准和模板要求。
      review_criteria:
        type: string
        description: 评审指标或打分点。
      research_objectives:
        type: string
        description: 拟解决科学/技术问题与研究目标。
      technical_route:
        type: string
        description: 已有或期望的技术路线。
      budget_constraints:
        type: string
        description: 经费、周期、团队和资源限制。
      team_basis:
        type: string
        description: 团队前期基础、论文、专利、平台或数据积累。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: conditional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- objective_method_metric_alignment
- review_criteria_explicitly_addressed
- feasibility_risk_mitigation_included
- milestones_and_deliverables_traceable
graph_template:
  phases:
  - name: step_01_grant_planner
    tasks:
    - name: grant_planner
      subagent_type: react
      skill_id: grant-planner
      inputs:
        task_focus: 把项目 idea 转成目标、任务、技术路线、指标、里程碑和风险控制。
        capability_name: Idea 到申报书
        capability_goal: produce_or_update_primary_document
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_proposal_writer
    depends_on:
    - step_01_grant_planner
    tasks:
    - name: proposal_writer
      subagent_type: react
      skill_id: proposal-writer
      inputs:
        task_focus: 按申报指南和评审标准生成申报书章节或方案包。
        capability_name: Idea 到申报书
        capability_goal: produce_or_update_primary_document
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_review_critic
    depends_on:
    - step_02_proposal_writer
    tasks:
    - name: review_critic
      subagent_type: react
      skill_id: review-critic
      inputs:
        task_focus: 按真实评审人视角做高强度审查，输出分级问题和可执行修改清单。
        capability_name: Idea 到申报书
        capability_goal: produce_or_update_primary_document
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 申报书方案包.md
          doc_kind: proposal_pack
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'Funder-rubric planning: problem, objectives, work packages, methods, metrics, feasibility, risk, and impact.'
    source_notes:
    - NSF-style merit-review logic where no local funder rubric is provided
    - User-provided call text remains authoritative
