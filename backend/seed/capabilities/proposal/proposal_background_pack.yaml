schema_version: capability.v2
id: proposal_background_pack
workspace_type: proposal
enabled: true
display:
  name: 背景与意义论证
  description: 检索政策、文献和行业材料并生成背景意义论证
  icon: file-pen
  color: blue
  order: 20
  entry_tier: primary
intent:
  description: 检索政策、文献和行业材料并生成背景意义论证
  trigger_phrases:
  - 背景与意义论证
  disambiguation: {}
mission:
  goal: produce_or_update_primary_document
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 检索政策、文献和行业材料并生成背景意义论证
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要检索政策、文献、行业材料并生成背景意义、立项依据或国内外现状。
  - 用户想先补足申报书的必要性、价值和问题背景。
  not_for:
  - 已经要生成完整申报书主稿，应转向 idea_to_proposal_package。
  - 主要要设计实验路线和指标，应转向 technical_route_package。
  user_intents:
  - 背景意义
  - 立项依据
  - 政策文献梳理
  positive_examples:
  - 帮我整理这个项目的背景意义和立项依据。
  - 检索政策和文献，写一版国内外研究现状。
  negative_examples:
  - 帮我写完整申报书。
  - 帮我设计实验验证方案。
  minimum_context:
    topic: required
    source_guidelines: optional
    target_format: optional
  ambiguity:
    overlaps_with:
    - idea_to_proposal_package
    - technical_route_package
    ask_user_when:
    - 用户同时要求背景和完整主稿，但没有说明先补证据还是直接成稿。
  clarification:
    ask_when_missing:
      topic: 你想围绕哪个项目方向来整理背景意义？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让背景专家整理政策、文献和立项依据，形成可纳入申报书的材料。
    clarification_prefix: 可以，我先确认项目主题。
    lightweight_answer_hint: 简短背景段落或标题说明可以直接在 chat 里处理。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      funding_program:
        type: string
        description: 基金/项目类别、指南方向或申报渠道。
      call_guideline:
        type: string
        description: 申报指南、评审标准和模板要求。
      review_criteria:
        type: string
        description: 评审指标或打分点。
      research_objectives:
        type: string
        description: 拟解决科学/技术问题与研究目标。
      technical_route:
        type: string
        description: 已有或期望的技术路线。
      budget_constraints:
        type: string
        description: 经费、周期、团队和资源限制。
      team_basis:
        type: string
        description: 团队前期基础、论文、专利、平台或数据积累。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: optional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- objective_method_metric_alignment
- review_criteria_explicitly_addressed
- feasibility_risk_mitigation_included
- milestones_and_deliverables_traceable
graph_template:
  phases:
  - name: step_01_research_scout
    tasks:
    - name: research_scout
      subagent_type: searcher
      skill_id: research-scout
      inputs:
        query: '{{topic}} {{query}} {{goal}} {{raw_message}}'
        task_focus: 检索并筛选可支撑本任务的权威来源，输出可追溯来源表和缺口清单。
        capability_name: 背景与意义论证
        capability_goal: produce_or_update_primary_document
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        default_checked: true
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          venue: '{{item.venue}}'
          doi: '{{item.doi}}'
          url: '{{item.url}}'
          abstract: '{{item.abstract}}'
          citation_count: '{{item.citations}}'
          source: '{{item.source}}'
          external_id: '{{item.external_id}}'
          metadata: '{{item.raw}}'
      prompt_template: '{{raw_message}}'
  - name: step_02_literature_synthesizer
    depends_on:
    - step_01_research_scout
    tasks:
    - name: literature_synthesizer
      subagent_type: react
      skill_id: literature-synthesizer
      inputs:
        task_focus: 把检索结果和材料综合为主题矩阵、gap、可引用论断和后续写作素材。
        capability_name: 背景与意义论证
        capability_goal: produce_or_update_primary_document
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_proposal_writer
    depends_on:
    - step_02_literature_synthesizer
    tasks:
    - name: proposal_writer
      subagent_type: react
      skill_id: proposal-writer
      inputs:
        task_focus: 按申报指南和评审标准生成申报书章节或方案包。
        capability_name: 背景与意义论证
        capability_goal: produce_or_update_primary_document
        workspace_type: proposal
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 项目背景资料包.md
          doc_kind: research_pack
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'Funder-rubric planning: problem, objectives, work packages, methods, metrics, feasibility, risk, and impact.'
    source_notes:
    - NSF-style merit-review logic where no local funder rubric is provided
    - User-provided call text remains authoritative
