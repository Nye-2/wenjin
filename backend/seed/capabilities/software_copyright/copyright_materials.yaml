id: copyright_materials
workspace_type: software_copyright
enabled: true
display_name: 著作权材料
description: 生成软著申请的材料清单和模板
intent_description: 用户希望准备软著申请材料
trigger_phrases:
- 软著
- 著作权
- 软著材料
required_decisions:
- key: software_name
  ask: 软件名称是？
  type: string
brief_schema:
  type: object
  required:
  - software_name
  properties:
    software_name:
      type: string
    description:
      type: string
      optional: true
graph_template:
  phases:
  - name: write
    tasks:
    - name: draft
      subagent_type: react
      skill_id: framework-designer
      inputs:
        topic: 软著材料：{{software_name}}
        contributions: '{{description|default('''')}}'
      outputs:
      - kind: document
        mapping:
          name: '{{software_name}} 软著材料'
          doc_kind: framework_outline
          content: '{{output.markdown}}'
ui_meta:
  icon: file-text
  color: violet
  order: 1
  stages:
  - id: collect
    label: 收集材料
  - id: organize
    label: 整理说明
  - id: review
    label: 核对格式
  follow_up_prompt: 请基于这次软著材料清单继续指出还缺哪些证明材料、代码页和截图要求。
