id: technical_description
workspace_type: software_copyright
enabled: true
display_name: 技术说明书
description: 撰写软著技术说明书
intent_description: 用户希望写软件技术说明
trigger_phrases:
- 技术说明
- 写说明书
- 软件说明
required_decisions:
- key: software_name
  ask: 软件名称是？
  type: string
brief_schema:
  type: object
  required:
  - software_name
  properties:
    software_name:
      type: string
    description:
      type: string
      optional: true
graph_template:
  phases:
  - name: write
    tasks:
    - name: draft
      subagent_type: react
      skill_id: section-writer
      inputs:
        section_title: '{{software_name}} 技术说明书'
        outline: '{{description|default('''')}}'
        references: ''
        target_words: 1500
      outputs:
      - kind: document
        mapping:
          name: '{{software_name}} 技术说明书'
          doc_kind: section_draft
          content: '{{output.markdown}}'
ui_meta:
  icon: code
  color: indigo
  order: 0
  stages:
  - id: analyze
    label: 分析软件
  - id: draft
    label: 生成说明
  - id: revise
    label: 优化内容
  follow_up_prompt: 请基于这次技术说明书继续补齐章节细节，并指出最需要补充的技术实现信息。
