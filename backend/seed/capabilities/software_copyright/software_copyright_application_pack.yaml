schema_version: capability.v2
id: software_copyright_application_pack
workspace_type: software_copyright
enabled: true
display:
  name: 软著申请材料包
  description: 生成申请表填报素材、软件说明、功能模块和材料清单
  icon: file-pen
  color: blue
  order: 10
  entry_tier: primary
intent:
  description: 生成申请表填报素材、软件说明、功能模块和材料清单
  trigger_phrases:
  - 准备软著材料
  - 生成软著申请材料
  disambiguation: {}
mission:
  goal: produce_or_update_primary_document
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 生成申请表填报素材、软件说明、功能模块和材料清单
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要生成软著申请表填报素材、软件说明、功能模块和材料清单。
  - 用户希望把软件名称、版本、功能和现有材料整理成完整软著申请包。
  not_for:
  - 只需要代码片段、截图和版本证据整理，应转向 software_evidence_pack。
  - 只需要架构图或流程图，应转向 software_architecture_diagrams。
  user_intents:
  - 软著申请材料
  - 申请表素材
  - 软著材料包
  positive_examples:
  - 帮我生成这个软件的软著申请材料包。
  - 根据软件功能整理申请表和材料清单。
  - 按中国软著申请要求组织说明书、证据和填报信息。
  negative_examples:
  - 只帮我画模块架构图。
  - 整理代码截图和版本证据。
  - 软件著作权申请需要哪些材料？
  minimum_context:
    software_name: required
    version: optional
    existing_materials_summary: optional
  ambiguity:
    overlaps_with:
    - software_technical_manual
    - software_evidence_pack
    - software_architecture_diagrams
    ask_user_when:
    - 用户只说办软著，但没有说明需要完整材料包还是某类附件。
  clarification:
    ask_when_missing:
      software_name: 软件全称是什么？有版本号也可以一起给我。
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让软著材料专家整理申请表素材、软件说明和材料清单。
    clarification_prefix: 可以，我先确认软件名称。
    lightweight_answer_hint: 单个软著字段解释可以直接在 chat 里回答。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      software_name:
        type: string
        description: 软件全称。
      software_short_name:
        type: string
        description: 软件简称，如有。
      version:
        type: string
        description: 申请版本号。
      completion_date:
        type: string
        description: 开发完成日期。
      development_mode:
        type: string
        description: 独立开发、合作开发、委托开发或继受取得。
      runtime_environment:
        type: string
        description: 硬件、操作系统、依赖环境和部署方式。
      function_modules:
        type: string
        description: 已实现功能模块列表。
      source_material_status:
        type: string
        description: 源程序、说明书、截图、申请表和证明文件准备状态。
      manual_type:
        type: string
        description: 用户手册、操作手册、设计说明书或其他文档类型。
context_policy:
  room_reads:
    library: summary
    prism: excerpts
    decisions: full
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: optional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    react_timeout_seconds: 35
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- application_form_source_manual_consistency
- software_name_version_consistent
- source_and_document_deposit_rules_checked
- no_claims_about_unimplemented_features
- operation_screenshots_mapped_to_manual_steps
- no_ai_generated_evidence_screenshots
- prototype_screenshots_marked_when_not_real
research_evidence:
  review_packet: required
  required_surfaces:
  - workflow_trace
  - review_packet_completeness
  - claim_evidence_alignment
  - output_ref_reuse
  - figure_data_consistency
  - source_provenance
  - screenshot_provenance
  - non_fabrication_evidence
  surface_enforcement:
    workflow_trace: required_runtime
    review_packet_completeness: required_final
    claim_evidence_alignment: required_final
    output_ref_reuse: required_runtime
    figure_data_consistency: required_final
    source_provenance: required_final
    screenshot_provenance: required_final
    non_fabrication_evidence: required_final
  notes:
  - The software copyright package must connect name/version/module/manual/source/screenshot claims to concrete uploaded or sandbox-produced evidence and keep AI-generated screenshots out of evidentiary status.
graph_template:
  phases:
  - name: step_01_software_structure_planner
    tasks:
    - name: software_structure_planner
      subagent_type: react
      skill_id: software-structure-planner
      inputs:
        task_focus: 整理软著申请材料结构，建立软件名称/版本/模块/源码/文档一致性矩阵。
        capability_name: 软著申请材料包
        capability_goal: produce_or_update_primary_document
        workspace_type: software_copyright
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_software_visual_planner
    depends_on:
    - step_01_software_structure_planner
    tasks:
    - name: software_visual_planner
      subagent_type: react
      skill_id: figure-engineer
      inputs:
        task_focus: 依据权威模板和视觉 profile 规划模块图、流程图、部署图、权限图和操作截图；证据截图只能来自用户上传真实截图或本地原型 Playwright 截图，禁止 AI 生图伪造。
        capability_name: 软著申请材料包
        capability_goal: produce_or_update_primary_document
        workspace_type: software_copyright
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        authoritative_template_id: software_copyright_cn_application_pack
        visual_profile_id: software_copyright_cn_default
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_software_doc_drafter
    depends_on:
    - step_02_software_visual_planner
    tasks:
    - name: software_doc_drafter
      subagent_type: react
      skill_id: software-doc-drafter
      inputs:
        task_focus: 基于权威模板、结构矩阵和已生成/已标记的图示截图，生成软著说明书、申请表填报素材、功能模块说明和材料清单，缺失证据必须显式标记。
        capability_name: 软著申请材料包
        capability_goal: produce_or_update_primary_document
        workspace_type: software_copyright
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_04_review_critic
    depends_on:
    - step_03_software_doc_drafter
    tasks:
    - name: review_critic
      subagent_type: react
      skill_id: review-critic
      inputs:
        task_focus: 按真实评审人视角做高强度审查，输出分级问题和可执行修改清单。
        capability_name: 软著申请材料包
        capability_goal: produce_or_update_primary_document
        workspace_type: software_copyright
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 软著申请材料包.md
          doc_kind: software_copyright_pack
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  authoritative_template_id: software_copyright_cn_application_pack
  visual_profile_id: software_copyright_cn_default
  visual_generation:
    default_route: structured_diagram_and_real_screenshot
    evidence_screenshot_routes:
    - uploaded_real_screenshot
    - playwright_prototype_screenshot
    forbidden_routes:
    - llm_image_evidence_screenshot
    - hybrid_ai_evidence_screenshot
    screenshot_output_root: /workspace/outputs/screenshots/software_copyright
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'China software copyright registration support for Chinese users: application form material, source/document identification material, manual and version consistency.'
    source_notes:
    - China Computer Software Copyright Registration Measures articles 9-11 and CPCC guide conventions
