schema_version: capability.v2
id: embodiment_and_drawings
workspace_type: patent
enabled: true
display:
  name: 实施例与附图
  description: 生成实施例结构、流程图、装置图和附图说明
  icon: file-pen
  color: blue
  order: 40
  entry_tier: primary
intent:
  description: 生成实施例结构、流程图、装置图和附图说明
  trigger_phrases:
  - 实施例与附图
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 生成实施例结构、流程图、装置图和附图说明
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要生成实施例结构、流程图、装置图、附图说明和可实施细节。
  - 用户已有权利要求或技术方案，需要补强说明书支持和图示材料。
  not_for:
  - 主要任务是写专利全文初稿，应转向 invention_to_patent_draft。
  - 主要任务是现有技术检索和新颖性，应转向 prior_art_and_novelty_pack。
  user_intents:
  - 实施例
  - 专利附图
  - 附图说明
  positive_examples:
  - 根据这个方案生成实施例和附图说明。
  - 帮我画流程图、装置图并补充说明书支持。
  - 把这些技术步骤扩展成可支撑权利要求的实施方式。
  negative_examples:
  - 先查一下有没有类似专利。
  - 只优化独立权利要求。
  - 说明书附图标记一般怎么编号？
  minimum_context:
    invention_title: required
    technical_problem: optional
    existing_materials_summary: optional
  ambiguity:
    overlaps_with:
    - invention_to_patent_draft
    - claims_strategy
    ask_user_when:
    - 用户既要权利要求又要实施例附图，但没有说明当前缺口。
  clarification:
    ask_when_missing:
      invention_title: 这个发明的名称或核心流程是什么？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让实施例专家补强流程、装置图和附图说明。
    clarification_prefix: 可以，我先确认发明流程。
    lightweight_answer_hint: 单个附图编号或术语可以直接在 chat 里处理。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      invention_title:
        type: string
        description: 发明名称。
      jurisdiction:
        type: string
        description: 默认中国专利申请语境；仅当用户明确指定时才切换 PCT 或海外国家/地区。
      technical_field:
        type: string
        description: 技术领域。
      technical_problem:
        type: string
        description: 要解决的技术问题。
      core_inventive_features:
        type: string
        description: 区别于现有技术的核心技术特征。
      prior_art:
        type: string
        description: 已知现有技术、竞品、论文或专利。
      embodiments:
        type: string
        description: 实施方式、实验例、流程、装置结构或系统架构。
      drawing_list:
        type: string
        description: 附图清单和图号说明。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: required
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- claim_terms_supported_by_description
- independent_claim_scope_not_overbroad
- embodiments_enable_claim_features
- drawings_reference_numerals_consistent
- novelty_risk_logged
graph_template:
  phases:
  - name: step_01_patent_strategist
    tasks:
    - name: patent_strategist
      subagent_type: react
      skill_id: patent-strategist
      inputs:
        task_focus: 分析现有技术、区别特征、保护范围和权利要求布局。
        capability_name: 实施例与附图
        capability_goal: produce_workspace_review_package
        workspace_type: patent
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_figure_engineer
    depends_on:
    - step_01_patent_strategist
    tasks:
    - name: figure_engineer
      subagent_type: react
      skill_id: figure-engineer
      inputs:
        task_focus: 设计图表/流程图/架构图/附图说明，使其服务论证或申报材料一致性。
        capability_name: 实施例与附图
        capability_goal: produce_workspace_review_package
        workspace_type: patent
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_patent_drafter
    depends_on:
    - step_02_figure_engineer
    tasks:
    - name: patent_drafter
      subagent_type: react
      skill_id: patent-drafter
      inputs:
        task_focus: 生成权利要求书、说明书、摘要、实施例和附图说明草案。
        capability_name: 实施例与附图
        capability_goal: produce_workspace_review_package
        workspace_type: patent
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 实施例与附图说明.md
          doc_kind: patent_draft
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'China/CNIPA-first patent drafting for Chinese users: prior art, claim tree, support, embodiments, drawings, and formal risk review; PCT or overseas rules apply only when explicitly requested.'
    source_notes:
    - CNIPA application-file components and examination-practice constraints
    - WIPO Patent Drafting Manual only as secondary workflow reference for PCT/overseas requests
