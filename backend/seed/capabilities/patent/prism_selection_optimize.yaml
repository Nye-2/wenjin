schema_version: capability.v2
id: prism_selection_optimize
workspace_type: patent
enabled: true
display:
  name: Prism 划词优化
  description: 根据用户在 Prism 中划选的片段和补充指令，异步生成可审阅的专利材料修改
  icon: highlighter
  color: violet
  order: 900
  entry_tier: hidden
intent:
  description: Prism 编辑器内的划词优化、专利交底/申请文本局部修订和审阅式写入
  trigger_phrases:
  - Prism 划词优化
  - prism_selection_optimize
  - 划词优化
  - 划词改写
  disambiguation: {}
mission:
  goal: optimize_prism_selection
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 根据划选文本和点评生成待确认的 Prism 修改，不直接覆盖正文
  allowed_deliverables:
  - prism_file_change
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      file_path:
        type: string
      file_content:
        type: string
      selected_text:
        type: string
      instruction:
        type: string
      comment:
        type: string
      selection_start:
        type: integer
      selection_end:
        type: integer
      scope:
        type: string
        enum:
        - selection
        - section
      feedback_id:
        type: string
      anchor:
        type: object
      pdf_anchor:
        type: object
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: none
  prism_context:
    include_outline: true
    include_target_files: false
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: none
  profiles: []
  allowed_operations: []
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits: {}
  artifact_policy: {}
review_policy:
  default_targets:
  - prism_file_change
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- prism_selection_must_resolve_anchor
- preserve_latex_commands_and_citations
- user_review_before_apply
- no_unverified_claim_expansion
graph_template:
  phases:
  - name: step_01_selection_optimizer
    tasks:
    - name: selection_optimizer
      subagent_type: prism_selection_optimizer
      inputs:
        file_path: '{{file_path}}'
        file_content: '{{file_content}}'
        selected_text: '{{selected_text}}'
        instruction: '{{instruction}}'
        comment: '{{comment}}'
        selection_start: '{{selection_start}}'
        selection_end: '{{selection_end}}'
        anchor: '{{anchor}}'
        pdf_anchor: '{{pdf_anchor}}'
        scope: '{{scope|default("section")}}'
        feedback_id: '{{feedback_id}}'
        model_id: '{{model_id}}'
        raw_message: '{{raw_message}}'
      outputs:
      - kind: prism_file_change
        default_checked: true
        mapping:
          path: '{{output.path}}'
          pending_content: '{{output.pending_content}}'
          content_format: '{{output.content_format}}'
          logical_key: '{{output.logical_key}}'
          reason: '{{output.reason}}'
          current_hash: '{{output.current_hash}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: prism_inline_async_review
    strategy: 先定位划词，再按技术事实准确性、权利要求支撑、实施例完整性、审查适配度和表达清晰度决定局部优化重点；产物进入 Prism 审阅链路。
