id: patent_outline
workspace_type: patent
enabled: true
display_name: 专利框架
description: 撰写专利权利要求 + 说明书框架
intent_description: 用户希望准备专利材料
trigger_phrases:
  - 专利框架
  - 写专利
  - 权利要求
required_decisions:
  - key: invention
    ask: "发明内容/核心技术点是？"
    type: string
brief_schema:
  type: object
  required: [invention]
  properties:
    invention: { type: string }
graph_template:
  phases:
    - name: design
      tasks:
        - name: outline
          subagent_type: react
          skill_id: framework-designer
          inputs:
            topic: "专利：{{invention}}"
            contributions: ""
          outputs:
            - kind: document
              mapping:
                name: "专利框架"
                doc_kind: framework_outline
                content: "{{output.markdown}}"
result_card_template: framework_outline
