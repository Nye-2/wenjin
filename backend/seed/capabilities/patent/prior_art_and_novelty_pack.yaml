schema_version: capability.v2
id: prior_art_and_novelty_pack
workspace_type: patent
enabled: true
display:
  name: 现有技术与新颖性
  description: 检索现有技术，形成区别特征、风险和规避建议
  icon: file-pen
  color: blue
  order: 20
  entry_tier: primary
intent:
  description: 检索现有技术，形成区别特征、风险和规避建议
  trigger_phrases:
  - 现有技术与新颖性
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 检索现有技术，形成区别特征、风险和规避建议
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要检索现有技术、形成区别特征、新颖性风险和规避建议。
  - 用户想在起草前判断技术方案是否容易被现有技术覆盖。
  not_for:
  - 已经要直接起草专利初稿，应转向 invention_to_patent_draft。
  - 只需要实施例和附图说明，应转向 embodiment_and_drawings。
  user_intents:
  - 现有技术检索
  - 新颖性分析
  - 区别特征
  positive_examples:
  - 帮我查这个发明方向的现有技术并分析新颖性风险。
  - 找对比文件，整理区别特征和规避建议。
  - 围绕这项技术方案做一份专利检索和 novelty 风险包。
  negative_examples:
  - 直接帮我写专利申请书。
  - 只帮我画实施流程图。
  - 帮我解释一下现有技术的定义。
  minimum_context:
    invention_title: required
    technical_problem: optional
    technical_field: optional
  ambiguity:
    overlaps_with:
    - invention_to_patent_draft
    - claims_strategy
    ask_user_when:
    - 用户既想查现有技术又想写初稿，但没有说明优先顺序。
  clarification:
    ask_when_missing:
      invention_title: 这个发明或技术方案的名称是什么？请简单说下解决的问题。
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让现有技术专家检索对比文件、提炼区别特征和新颖性风险。
    clarification_prefix: 可以，我先确认技术方案。
    lightweight_answer_hint: 一般性新颖性概念可以直接解释。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      invention_title:
        type: string
        description: 发明名称。
      jurisdiction:
        type: string
        description: 默认中国专利申请语境；仅当用户明确指定时才切换 PCT 或海外国家/地区。
      technical_field:
        type: string
        description: 技术领域。
      technical_problem:
        type: string
        description: 要解决的技术问题。
      core_inventive_features:
        type: string
        description: 区别于现有技术的核心技术特征。
      prior_art:
        type: string
        description: 已知现有技术、竞品、论文或专利。
      embodiments:
        type: string
        description: 实施方式、实验例、流程、装置结构或系统架构。
      drawing_list:
        type: string
        description: 附图清单和图号说明。
context_policy:
  room_reads:
    library: summary
    prism: excerpts
    decisions: full
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: optional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- claim_terms_supported_by_description
- independent_claim_scope_not_overbroad
- embodiments_enable_claim_features
- drawings_reference_numerals_consistent
- novelty_risk_logged
graph_template:
  phases:
  - name: step_01_research_scout
    tasks:
    - name: research_scout
      subagent_type: searcher
      skill_id: research-scout
      inputs:
        query: '{{topic}} {{query}} {{goal}} {{raw_message}}'
        task_focus: 检索并筛选可支撑本任务的权威来源，输出可追溯来源表和缺口清单。
        capability_name: 现有技术与新颖性
        capability_goal: produce_workspace_review_package
        workspace_type: patent
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        default_checked: true
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          venue: '{{item.venue}}'
          doi: '{{item.doi}}'
          url: '{{item.url}}'
          abstract: '{{item.abstract}}'
          citation_count: '{{item.citations}}'
          source: '{{item.source}}'
          external_id: '{{item.external_id}}'
          metadata: '{{item.raw}}'
      prompt_template: '{{raw_message}}'
  - name: step_02_patent_strategist
    depends_on:
    - step_01_research_scout
    tasks:
    - name: patent_strategist
      subagent_type: react
      skill_id: patent-strategist
      inputs:
        task_focus: 分析现有技术、区别特征、保护范围和权利要求布局。
        capability_name: 现有技术与新颖性
        capability_goal: produce_workspace_review_package
        workspace_type: patent
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_source_quality_auditor
    depends_on:
    - step_02_patent_strategist
    tasks:
    - name: source_quality_auditor
      subagent_type: react
      skill_id: source-quality-auditor
      inputs:
        task_focus: 审查来源权威性、元数据完整性、时效性和 claim-source 匹配风险。
        capability_name: 现有技术与新颖性
        capability_goal: produce_workspace_review_package
        workspace_type: patent
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 现有技术与新颖性分析.md
          doc_kind: prior_art_report
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'China/CNIPA-first patent drafting for Chinese users: prior art, claim tree, support, embodiments, drawings, and formal risk review; PCT or overseas rules apply only when explicitly requested.'
    source_notes:
    - CNIPA application-file components and examination-practice constraints
    - WIPO Patent Drafting Manual only as secondary workflow reference for PCT/overseas requests
