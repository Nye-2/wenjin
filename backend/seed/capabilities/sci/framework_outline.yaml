id: framework_outline
workspace_type: sci
enabled: true
display_name: 框架大纲
description: 收敛选题为 SCI 摘要 + 关键词 + 章节框架
intent_description: 用户希望生成 SCI 论文框架
trigger_phrases:
  - 生成框架
  - 论文框架
  - 大纲
required_decisions:
  - key: topic
    ask: "论文主题是？"
    type: string
brief_schema:
  type: object
  required: [topic]
  properties:
    topic: { type: string }
    contributions: { type: string, optional: true }
graph_template:
  phases:
    - name: design
      tasks:
        - name: outline
          subagent_type: react
          skill_id: framework-designer
          inputs:
            topic: "{{topic}}"
            contributions: "{{contributions|default('')}}"
          outputs:
            - kind: document
              mapping:
                name: "{{topic}} 论文框架"
                doc_kind: framework_outline
                content: "{{output.markdown}}"
result_card_template: framework_outline
