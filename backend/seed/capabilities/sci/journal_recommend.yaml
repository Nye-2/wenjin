id: journal_recommend
workspace_type: sci
enabled: true
display_name: 期刊推荐
description: 基于论文画像推荐候选期刊
intent_description: 用户希望知道论文投哪
trigger_phrases:
  - 期刊推荐
  - 投哪
  - 选刊
required_decisions:
  - key: abstract
    ask: "粘贴论文摘要"
    type: string
brief_schema:
  type: object
  required: [abstract]
  properties:
    abstract: { type: string }
    discipline: { type: string, optional: true }
    prefs: { type: string, optional: true }
graph_template:
  phases:
    - name: recommend
      tasks:
        - name: pick
          subagent_type: react
          skill_id: journal-recommender
          inputs:
            abstract: "{{abstract}}"
            discipline: "{{discipline|default('计算机科学')}}"
            prefs: "{{prefs|default('无')}}"
          outputs:
            - kind: document
              mapping:
                name: "期刊推荐"
                doc_kind: journal_recommend
                content: "{{output.markdown}}"
result_card_template: journal_recommend
