schema_version: capability.v2
id: research_question_to_paper
workspace_type: sci
enabled: true
display:
  name: 问题到 SCI 初稿
  description: 根据 research question、材料和目标期刊生成或更新 SCI manuscript
  icon: file-pen
  color: blue
  order: 10
  entry_tier: primary
intent:
  description: 根据 research question、材料和目标期刊生成或更新 SCI manuscript
  trigger_phrases:
  - 写 SCI
  - 生成 SCI 初稿
  - 根据研究问题写论文
  disambiguation: {}
mission:
  goal: produce_or_update_primary_document
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 根据 research question、材料和目标期刊生成或更新 SCI manuscript
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户已经有 research question、实验材料或写作方向，希望生成或更新 SCI 主稿。
  - 用户明确要求搭建论文结构、摘要、引言、方法、结果或讨论等成稿产物。
  not_for:
  - 只需要找文献 gap 或判断选题，应优先 sci_literature_positioning。
  - 只需要投稿期刊建议，应转向 journal_submission_strategy。
  user_intents:
  - 写 SCI 初稿
  - 生成论文结构
  - 更新 manuscript
  positive_examples:
  - 根据这个 research question 和材料帮我写 SCI 初稿。
  - 帮我把已有实验结果整理成论文主稿。
  - 用这些数据、方法和结论搭建一篇完整的 IMRaD 论文草稿。
  negative_examples:
  - 这个方向有什么研究空白？
  - 这篇文章适合投什么期刊？
  - 只帮我改一下摘要里的这句话。
  minimum_context:
    topic: required
    existing_materials_summary: optional
    target_journal: optional
  ambiguity:
    overlaps_with:
    - sci_literature_positioning
    - sci_revision_for_journal
    ask_user_when:
    - 用户只给了宽泛方向，同时可能需要先定位 gap 或直接写稿。
  clarification:
    ask_when_missing:
      topic: 你想围绕哪个具体 research question 或论文题目来推进初稿？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让论文团队按 SCI 主稿目标推进结构、证据链和可审阅修改。
    clarification_prefix: 可以，我先确认论文的核心问题。
    lightweight_answer_hint: 如果只是问一段怎么改，可以直接在 chat 里先改。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      target_journal:
        type: string
        description: 目标期刊或备选期刊。
      article_type:
        type: string
        description: Original Article/Review/Case Study/Short Communication 等。
      reporting_guideline:
        type: string
        description: 适用 reporting guideline，如 PRISMA、CONSORT、STROBE、ARRIVE、SAGER 等。
      study_design:
        type: string
        description: 实验、观察、建模、综述或方法学研究设计。
      data_assets:
        type: string
        description: 数据、代码、实验记录、图表或补充材料。
      submission_constraints:
        type: string
        description: 字数、图表数量、开放数据、伦理、cover letter 等要求。
context_policy:
  room_reads:
    library: summary
    prism: excerpts
    decisions: full
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: conditional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
citation_policy:
  source_scope: workspace_library
  required_for_prism_manuscript: true
  allowed_commands:
  - cite
  - citep
  - citet
  bibliography_file: refs.bib
  bibliography_command: \bibliography{refs}
  missing_key_behavior: block_prism_stage
  record_usage: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- library_sources_are_citation_ssot
- refs_bib_projection_synced
- missing_citation_keys_block_prism_stage
- citation_usage_recorded
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- reporting_guideline_checked
- imrad_or_journal_structure_respected
- methods_results_discussion_consistent
- data_code_availability_considered
research_evidence:
  review_packet: required
  required_surfaces:
  - workflow_trace
  - review_packet_completeness
  - claim_evidence_alignment
  - citation_strength
  - writing_semantic_preservation
  - writing_academic_style
  surface_enforcement:
    workflow_trace: required_runtime
    review_packet_completeness: required_final
    claim_evidence_alignment: required_final
    citation_strength: required_runtime
    writing_semantic_preservation: required_final
    writing_academic_style: required_final
  notes:
  - The manuscript workflow must stage Prism changes through review, preserve semantic meaning, improve academic style, and keep every claim aligned to Library-backed evidence.
methodology:
  archetype: paper_build
  stages:
  - id: project_context
    purpose: Capture research question, contribution promise, target journal constraints, available materials, and known missing evidence.
    required_artifacts:
    - project_context
    - missing_evidence_list
    user_checkpoint: optional
    quality_surfaces:
    - review_packet_completeness
  - id: architecture
    purpose: Build the manuscript spine, section contracts, argument chain, and claim-evidence-citation plan before drafting.
    required_artifacts:
    - paper_spine
    - section_contracts
    - claim_inventory
    quality_surfaces:
    - claim_evidence_alignment
  - id: evidence_probe
    purpose: Check methods, results, figures, data/code readiness, and sandbox probe outputs without upgrading unverified probes into final empirical evidence.
    required_artifacts:
    - method_probe_plan
    - evidence_gap_table
    - reproducibility_notes
    quality_surfaces:
    - workflow_trace
    - claim_evidence_alignment
  - id: draft
    purpose: Draft or update manuscript text from confirmed architecture, Library citations, evidence boundaries, and journal-aware section intent.
    required_artifacts:
    - manuscript_draft
    - claim_evidence_map
    quality_surfaces:
    - writing_semantic_preservation
    - writing_academic_style
    - citation_strength
  - id: audit_compress
    purpose: Audit citation keys, unsupported claims, semantic preservation, academic style, and review packet readiness before staging Prism changes.
    required_artifacts:
    - citation_audit
    - style_audit
    - review_packet
    user_checkpoint: required
    quality_surfaces:
    - review_packet_completeness
    - claim_evidence_alignment
    - citation_strength
  claim_policy:
    mode: two_pass
    extraction_artifact: claim_inventory
    verification_artifact: claim_evidence_map
    unsupported_claim_behavior: mark_for_user_decision
  retrieval_policy:
    escalation:
    - workspace_library_exact
    - workspace_library_bm25
    - workspace_library_semantic
    - sandbox_artifact_lookup
    - web_search_with_import
    prefer_workspace_library: true
    require_import_before_citation: true
  completion_gates:
  - review_packet_completeness
  - claim_evidence_alignment
  - citation_strength
  - writing_semantic_preservation
  - writing_academic_style
graph_template:
  phases:
  - name: step_01_manuscript_architect
    tasks:
    - name: manuscript_architect
      subagent_type: react
      skill_id: manuscript-architect
      inputs:
        task_focus: 建立章节结构、论证链、section contract、claim-evidence-citation plan；必须把 library_context.citable_sources 作为引用事实源，为每个背景、相关工作和方法比较论断分配现有 citation_key，缺失来源时标记 NEEDS_SOURCE。
        capability_name: 问题到 SCI 初稿
        capability_goal: produce_or_update_primary_document
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        library_context: '{{library_context}}'
        citation_context: '{{citation_context}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_evidence_analyst
    depends_on:
    - step_01_manuscript_architect
    tasks:
    - name: evidence_analyst
      subagent_type: react
      skill_id: evidence-analyst
      inputs:
        task_focus: 规划或核验数据、实验、代码、截图和量化结论，标明可复现证据与限制；不要把 sandbox 探针或估算写成真实实验结论，所有外部事实仍需绑定 Library citation_key。
        capability_name: 问题到 SCI 初稿
        capability_goal: produce_or_update_primary_document
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        library_context: '{{library_context}}'
        citation_context: '{{citation_context}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_sandbox_method_probe
    depends_on:
    - step_02_evidence_analyst
    tasks:
    - name: sandbox_method_probe
      subagent_type: sandbox_python
      skill_id: manuscript-sandbox-probe
      inputs:
        operation: python_script
        node_id: research_question_to_paper__sandbox_method_probe
        script_name: method_probe.py
        upstream_outputs: '{{phases}}'
        script: |
          import json

          # Topic-generic method sanity probe. This produces a reproducibility
          # checklist and lightweight validation plan from upstream context; it
          # must not be written as empirical evidence until real data/code runs.
          upstream = """{{phases}}"""
          method_probe_plan = [
              {
                  "check": "assumption_inventory",
                  "purpose": "List method assumptions that must be true for the manuscript claims.",
                  "requires_user_or_data_confirmation": True,
              },
              {
                  "check": "data_and_metric_fit",
                  "purpose": "Identify datasets, metrics, baselines, and evaluation splits required by the research question.",
                  "requires_user_or_data_confirmation": True,
              },
              {
                  "check": "minimal_reproducibility_artifact",
                  "purpose": "Define the smallest code, table, figure, or calculation needed to verify each quantitative claim.",
                  "requires_user_or_data_confirmation": True,
              },
              {
                  "check": "claim_boundary_review",
                  "purpose": "Separate confirmed evidence, plausible design rationale, and claims that must stay marked as NEEDS_EVIDENCE.",
                  "requires_user_or_data_confirmation": False,
              },
          ]
          print(json.dumps({
              "probe": "topic_generic_method_probe",
              "method_probe_plan": method_probe_plan,
              "required_user_confirmation": [
                  "research objective and claim scope",
                  "available dataset, benchmark, or source material",
                  "evaluation metric and baseline requirements",
                  "code/data availability constraints",
              ],
              "upstream_context_chars": len(upstream),
              "claim_boundary": "Sandbox probe is a reproducibility scaffold, not final empirical evidence.",
          }, ensure_ascii=False))
      outputs:
      - kind: document
        default_checked: false
        mapping:
          name: SCI 方法沙盒探针.md
          doc_kind: analysis_report
          content: '{{output.report_markdown}}'
      prompt_template: '{{raw_message}}'
  - name: step_04_manuscript_writer
    depends_on:
    - step_03_sandbox_method_probe
    tasks:
    - name: manuscript_writer
      subagent_type: react
      skill_id: manuscript-writer
      inputs:
        task_focus: 基于上游结构、证据与 Library citation context 写作或修订主稿；正文中的背景、相关工作、方法比较和非显然论断必须引用 library_context.citable_sources 的 citation_key；不得发明 citation key；不得手写 refs.bib 内容；主稿必须包含 \bibliographystyle{plain} 和 \bibliography{refs}，由 runtime 从 Library projection 写入 refs.bib。
        capability_name: 问题到 SCI 初稿
        capability_goal: produce_or_update_primary_document
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        library_context: '{{library_context}}'
        citation_context: '{{citation_context}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: prism_file_change
        default_checked: true
        mapping:
          logical_key: project:main
          path: main.tex
          content_format: latex_document
          reason: feature_proposal
          pending_content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
  - name: step_05_citation_auditor
    depends_on:
    - step_04_manuscript_writer
    tasks:
    - name: citation_auditor
      subagent_type: react
      skill_id: citation-auditor
      inputs:
        task_focus: 审查文本中的事实/方法/数值论断是否有可靠来源支撑，重点检查正文 \cite{...} 是否来自 library_context.citation_keys，且 Prism 的 refs.bib projection 能覆盖这些引用；发现 missing key 时必须标为 blocking risk，不得建议虚构引用修补。
        capability_name: 问题到 SCI 初稿
        capability_goal: produce_or_update_primary_document
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        library_context: '{{library_context}}'
        citation_context: '{{citation_context}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: ICMJE/IMRaD manuscript preparation, EQUATOR/PRISMA-style reporting-guideline awareness, and reproducibility checks.
    source_notes:
    - ICMJE manuscript sections
    - EQUATOR reporting guideline lookup
    - PRISMA 2020 for systematic reviews when applicable
    - FAIR/TOP reproducibility concepts
