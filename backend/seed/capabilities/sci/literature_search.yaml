id: literature_search
workspace_type: sci
enabled: true
display_name: 文献检索
description: 围绕 SCI 主题做系统检索和研究空白识别
intent_description: 用户希望为 SCI 选题建立候选文献池
trigger_phrases:
- 检索文献
- 文献检索
- 找论文
required_decisions:
- key: topic
  ask: 检索主题是？
  type: string
brief_schema:
  type: object
  required:
  - topic
  properties:
    topic:
      type: string
    year_min:
      type: integer
      optional: true
graph_template:
  phases:
  - name: discover
    tasks:
    - name: search
      subagent_type: searcher
      skill_id: scholar-searcher
      inputs:
        query: '{{topic}}'
        year_min: '{{year_min|default(2019)}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          doi: '{{item.doi}}'
          abstract: '{{item.abstract}}'
  - name: synthesize
    depends_on:
    - discover
    tasks:
    - name: review
      subagent_type: react
      skill_id: literature-reviewer
      inputs:
        topic: '{{topic}}'
        papers: '{{phases.discover.search.output.papers}}'
      outputs:
      - kind: document
        mapping:
          name: '{{topic}} 检索综述'
          doc_kind: literature_review
          content: '{{output.markdown}}'
ui_meta:
  icon: search
  color: emerald
  order: 0
  stages:
  - id: search
    label: 检索文献
  - id: filter
    label: 筛选结果
  follow_up_prompt: 请基于这次检索结果筛出最值得精读的文献，并说明各自对后续写作的价值。
