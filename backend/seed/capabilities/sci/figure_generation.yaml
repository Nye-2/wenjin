id: figure_generation
workspace_type: sci
enabled: true
display_name: 图表设计
description: 把概念/流程/数据转成 SCI 图表说明 + Mermaid
intent_description: 用户希望生成 SCI 论文图表
trigger_phrases:
  - 画图
  - 生成图表
  - 设计图
required_decisions:
  - key: concept
    ask: "图要表达什么？"
    type: string
brief_schema:
  type: object
  required: [concept]
  properties:
    concept: { type: string }
    section: { type: string, optional: true }
graph_template:
  phases:
    - name: design
      tasks:
        - name: figure
          subagent_type: react
          skill_id: figure-designer
          inputs:
            concept: "{{concept}}"
            section: "{{section|default('Method')}}"
          outputs:
            - kind: document
              mapping:
                name: "图表 - {{concept}}"
                doc_kind: figure_spec
                content: "{{output.markdown}}"
result_card_template: figure_spec
