schema_version: capability.v2
id: sci_empirical_package
workspace_type: sci
enabled: true
display:
  name: 实验/实证结果包
  description: 跑数据分析、实验对比、消融、统计检验和图表
  icon: file-pen
  color: blue
  order: 30
  entry_tier: primary
intent:
  description: 跑数据分析、实验对比、消融、统计检验和图表
  trigger_phrases:
  - 实验/实证结果包
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 跑数据分析、实验对比、消融、统计检验和图表
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要在 sandbox 中跑数据分析、实验对比、消融、统计检验或生成图表。
  - 用户已经有数据、代码、实验记录或想验证结果可靠性。
  not_for:
  - 只讨论实验设计思路但不需要运行分析。
  - 只需要检查可复现性和材料缺口，应转向 reproducibility_audit。
  user_intents:
  - 跑实验
  - 数据分析
  - 生成图表
  positive_examples:
  - 用这些数据跑一下统计检验并生成论文图表。
  - 帮我做消融实验和结果包。
  negative_examples:
  - 这个实验应该怎么设计？
  - 看看我的代码能不能复现论文。
  minimum_context:
    data_assets: required
    topic: optional
    study_design: optional
  ambiguity:
    overlaps_with:
    - reproducibility_audit
    - research_question_to_paper
    ask_user_when:
    - 用户既想跑实验又想直接写论文，但没有说明当前是否有数据或代码。
  clarification:
    ask_when_missing:
      data_assets: 你现在有哪些数据、代码或实验记录可以用于分析？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让实验专家在 workspace sandbox 中处理数据、图表和结果说明。
    clarification_prefix: 可以，我先确认可用的数据或代码。
    lightweight_answer_hint: 纯实验设计讨论可以先在 chat 里快速梳理。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      target_journal:
        type: string
        description: 目标期刊或备选期刊。
      article_type:
        type: string
        description: Original Article/Review/Case Study/Short Communication 等。
      reporting_guideline:
        type: string
        description: 适用 reporting guideline，如 PRISMA、CONSORT、STROBE、ARRIVE、SAGER 等。
      study_design:
        type: string
        description: 实验、观察、建模、综述或方法学研究设计。
      data_assets:
        type: string
        description: 数据、代码、实验记录、图表或补充材料。
      submission_constraints:
        type: string
        description: 字数、图表数量、开放数据、伦理、cover letter 等要求。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: required
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- reporting_guideline_checked
- imrad_or_journal_structure_respected
- methods_results_discussion_consistent
- data_code_availability_considered
research_evidence:
  required_surfaces:
  - literature
  - experiment
  - writing
  - workflow_trace
  - experiment_interpretation
  - output_ref_reuse
  notes:
  - The workflow must produce reviewable literature, sandbox artifact, writing output, member execution trace, interpreted experiment evidence, and reused output refs when recoverable refs exist.
graph_template:
  phases:
  - name: step_01_evidence_analyst
    tasks:
    - name: evidence_analyst
      subagent_type: react
      skill_id: evidence-analyst
      inputs:
        task_focus: 规划或核验数据、实验、代码、截图和量化结论，标明可复现证据与限制。
        capability_name: 实验/实证结果包
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_sandbox_empirical_probe
    depends_on:
    - step_01_evidence_analyst
    tasks:
    - name: sandbox_empirical_probe
      subagent_type: sandbox_python
      skill_id: empirical-sandbox-probe
      inputs:
        operation: python_script
        node_id: sci_empirical_package__sandbox_empirical_probe
        script_name: empirical_probe.py
        upstream_outputs: '{{phases}}'
        script: |
          import json
          import math

          # Deterministic probe: estimates relative communication cost for
          # full fine-tuning vs LoRA-style adapter fine-tuning. It is a
          # reproducibility scaffold, not a claim of empirical performance.
          model_params = 7_000_000_000
          lora_trainable_params = 16_000_000
          clients = [10, 50, 100]
          rounds = [20, 50, 100]
          bytes_per_param = 2
          rows = []
          for client_count in clients:
              for round_count in rounds:
                  full_gb = model_params * bytes_per_param * client_count * round_count / (1024 ** 3)
                  lora_gb = lora_trainable_params * bytes_per_param * client_count * round_count / (1024 ** 3)
                  rows.append({
                      "clients": client_count,
                      "rounds": round_count,
                      "full_tuning_transfer_gb": round(full_gb, 2),
                      "adapter_transfer_gb": round(lora_gb, 2),
                      "reduction_ratio": round(full_gb / lora_gb, 1),
                  })
          print(json.dumps({
              "probe": "federated_llm_adapter_communication_cost",
              "assumption": "fp16 parameter deltas; no optimizer-state transfer",
              "rows": rows,
              "claim_boundary": "Use only as a sandbox sanity-check scaffold unless replaced by project data.",
          }, ensure_ascii=False))
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 实验沙盒探针.md
          doc_kind: analysis_report
          content: '{{output.report_markdown}}'
      prompt_template: '{{raw_message}}'
  - name: step_03_figure_engineer
    depends_on:
    - step_02_sandbox_empirical_probe
    tasks:
    - name: figure_engineer
      subagent_type: react
      skill_id: figure-engineer
      inputs:
        task_focus: 设计图表/流程图/架构图/附图说明，使其服务论证或申报材料一致性。
        capability_name: 实验/实证结果包
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_04_manuscript_writer
    depends_on:
    - step_03_figure_engineer
    tasks:
    - name: manuscript_writer
      subagent_type: react
      skill_id: manuscript-writer
      inputs:
        task_focus: 基于上游结构与证据写作或修订主稿，缺证据处显式标记。
        capability_name: 实验/实证结果包
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 实验实证结果包.md
          doc_kind: analysis_report
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: ICMJE/IMRaD manuscript preparation, EQUATOR/PRISMA-style reporting-guideline awareness, and reproducibility checks.
    source_notes:
    - ICMJE manuscript sections
    - EQUATOR reporting guideline lookup
    - PRISMA 2020 for systematic reviews when applicable
    - FAIR/TOP reproducibility concepts
