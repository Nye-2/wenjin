id: literature_review
workspace_type: sci
enabled: true
display_name: 文献综述
description: 把文献池整理为 Related Work 章节
intent_description: 用户希望基于已检索的文献写综述
trigger_phrases:
- 写综述
- related work
- 综述写作
required_decisions:
- key: topic
  ask: 综述主题是？
  type: string
brief_schema:
  type: object
  required:
  - topic
  properties:
    topic:
      type: string
    papers:
      type: string
      optional: true
graph_template:
  phases:
  - name: discover
    tasks:
    - name: search
      subagent_type: searcher
      skill_id: scholar-searcher
      inputs:
        query: '{{topic}}'
  - name: synthesize
    depends_on:
    - discover
    tasks:
    - name: write
      subagent_type: react
      skill_id: literature-reviewer
      inputs:
        topic: '{{topic}}'
        papers: '{{phases.discover.search.output.papers}}'
      outputs:
      - kind: document
        mapping:
          name: '{{topic}} 文献综述'
          doc_kind: literature_review
          content: '{{output.markdown}}'
ui_meta:
  icon: book-open
  color: cyan
  order: 1
  stages:
  - id: collect
    label: 整理文献
  - id: synthesize
    label: 综合观点
  - id: draft
    label: 生成综述
  follow_up_prompt: 请基于这次文献综述继续细化研究空白，并给出 3 个可写成 SCI 的问题陈述。
runtime:
  mode: compute_workflow
  review_gate: {}
  allowed_paths: []
  requires_sandbox: false
dashboard_meta:
  panel: analysis_panel
  status_kind: literature_review
