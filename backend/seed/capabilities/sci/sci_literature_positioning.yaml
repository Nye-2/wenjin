schema_version: capability.v2
id: sci_literature_positioning
workspace_type: sci
enabled: true
display:
  name: 文献定位与创新点
  description: 建立相关工作、gap 和 contribution positioning
  icon: file-pen
  color: blue
  order: 20
  entry_tier: primary
intent:
  description: 建立相关工作、gap 和 contribution positioning
  trigger_phrases:
  - 文献定位与创新点
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 建立相关工作、gap 和 contribution positioning
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要围绕主题建立文献脉络、研究空白、创新点和 contribution positioning。
  - 用户想先判断一个 SCI 选题是否值得做、怎么切入或怎么对齐相关工作。
  not_for:
  - 只是在问概念定义、单篇论文解释或一句话润色。
  - 已经明确要直接写完整 SCI 初稿，应转向 research_question_to_paper。
  user_intents:
  - 找研究空白
  - 梳理相关工作
  - 判断创新点
  positive_examples:
  - 联邦学习结合大模型这个方向帮我找 gap 和创新点。
  - 帮我整理这个主题的相关工作和 contribution。
  - 围绕这个选题梳理研究脉络并提出可写的创新点。
  negative_examples:
  - 联邦学习是什么？
  - 直接帮我写一篇完整 SCI 初稿。
  - 帮我把这段 related work 润色一下。
  minimum_context:
    topic: required
    existing_materials_summary: optional
    target_journal: optional
  ambiguity:
    overlaps_with:
    - research_question_to_paper
    - journal_submission_strategy
    ask_user_when:
    - 用户同时表达找 gap 和写初稿，但没有说明先做定位还是直接成稿。
  clarification:
    ask_when_missing:
      topic: 你想围绕哪个具体主题、题目或技术方向来找文献定位？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让文献专家先整理相关工作、gap 和可用创新点，结果会在右侧更新。
    clarification_prefix: 可以，我先确认一个核心主题。
    lightweight_answer_hint: 如果只是想了解概念或单篇论文，可以直接在 chat 里回答，不必启动团队任务。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      target_journal:
        type: string
        description: 目标期刊或备选期刊。
      article_type:
        type: string
        description: Original Article/Review/Case Study/Short Communication 等。
      reporting_guideline:
        type: string
        description: 适用 reporting guideline，如 PRISMA、CONSORT、STROBE、ARRIVE、SAGER 等。
      study_design:
        type: string
        description: 实验、观察、建模、综述或方法学研究设计。
      data_assets:
        type: string
        description: 数据、代码、实验记录、图表或补充材料。
      submission_constraints:
        type: string
        description: 字数、图表数量、开放数据、伦理、cover letter 等要求。
context_policy:
  room_reads:
    library: summary
    prism: excerpts
    decisions: full
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: optional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
citation_policy:
  source_scope: workspace_library
  required_for_prism_manuscript: false
  allowed_commands:
  - cite
  - citep
  - citet
  bibliography_file: refs.bib
  bibliography_command: \bibliography{refs}
  missing_key_behavior: warn
  record_usage: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- library_sources_are_citation_ssot
- citation_ready_plan_required
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- reporting_guideline_checked
- imrad_or_journal_structure_respected
- methods_results_discussion_consistent
- data_code_availability_considered
research_evidence:
  review_packet: required
  required_surfaces:
  - workflow_trace
  - review_packet_completeness
  - claim_evidence_alignment
  - paper_relevance
  - citation_strength
  surface_enforcement:
    workflow_trace: required_runtime
    review_packet_completeness: required_final
    claim_evidence_alignment: required_final
    paper_relevance: required_runtime
    citation_strength: required_runtime
  notes:
  - The workflow must produce topic-aligned sources, citation/source audit evidence, claim-evidence mappings, expert workflow trace, and previewable review packet items.
methodology:
  archetype: literature_survey
  stages:
  - id: intent
    purpose: Clarify topic scope, target audience, deliverable, existing materials, and journal or reporting constraints before retrieval.
    required_artifacts:
    - intent_brief
    user_checkpoint: optional
    quality_surfaces:
    - review_packet_completeness
  - id: triage
    purpose: Search and screen candidate papers by relevance, recency, venue, method fit, and citation readiness.
    required_artifacts:
    - search_plan
    - triage_table
    - source_quality_notes
    quality_surfaces:
    - paper_relevance
    - citation_strength
  - id: deepen
    purpose: Convert retained sources into a theme matrix, gap hypotheses, and claim-source support map.
    required_artifacts:
    - theme_matrix
    - gap_matrix
    - claim_inventory
    quality_surfaces:
    - claim_evidence_alignment
  - id: synthesize
    purpose: Produce contribution candidates, related-work positioning, unresolved questions, and reviewable result cards.
    required_artifacts:
    - contribution_candidates
    - claim_evidence_map
    - review_packet
    user_checkpoint: required
    quality_surfaces:
    - review_packet_completeness
    - claim_evidence_alignment
  claim_policy:
    mode: two_pass
    extraction_artifact: claim_inventory
    verification_artifact: claim_evidence_map
    unsupported_claim_behavior: mark_for_user_decision
  retrieval_policy:
    escalation:
    - workspace_library_exact
    - workspace_library_bm25
    - workspace_library_semantic
    - web_search_with_import
    prefer_workspace_library: true
    require_import_before_citation: true
  completion_gates:
  - review_packet_completeness
  - claim_evidence_alignment
  - paper_relevance
  - citation_strength
runtime:
  mode: team_kernel
  allowed_tools:
  - web_search
  - library_read
  - citation_parser
  - prism_file_read
  - workspace_memory_read
  - prism_read
  - prism_change_staged
  - artifact_create
team_policy:
  core_templates:
  - research_planner.v1
  - research_scout.v1
  - literature_synthesizer.v1
  optional_templates:
  - citation_auditor.v1
  - document_architect.v1
  - critical_reviewer.v1
  - generalist_assistant.v1
  capability_tools:
  - web_search
  - library_read
  - citation_parser
  - prism_file_read
  - workspace_memory_read
  - prism_read
  - prism_change_staged
  - artifact_create
  capability_skills:
  - task-scope-planner
  - query-planner
  - research-scout
  - source-screener
  - literature-synthesizer
  - novelty-mapper
  - citation-auditor
  - source-quality-auditor
  - manuscript-architect
  - document-outline-builder
  - review-critic
  - claim-verifier
  - format-compliance-checker
  - structured-summary
  contract_overlay_skills:
  - sci-journal-rules
  contract_overlay_categories:
  - planning
  - method
  - evidence
  - writing
  - review
  - generalist
  recruitment_triggers:
    missing_sources:
    - research_scout.v1
    unsupported_claims:
    - citation_auditor.v1
    - critical_reviewer.v1
    writing_needed:
    - document_architect.v1
    overloaded_or_missing_specialist:
    - generalist_assistant.v1
  quality_pipeline:
  - provenance_required_for_claims
  - library_sources_are_citation_ssot
  - citation_ready_plan_required
  - unsupported_claims_marked_for_user_decision
  - reporting_guideline_checked
  limits:
    max_iterations: 4
    max_parallel_invocations: 3
    max_invocations_total: 10
    max_invocations_per_template: 3
    no_progress_rounds_before_stop: 2
  budget:
    max_tokens_soft: 60000
    max_tokens_hard: 90000
graph_template:
  phases:
  - name: step_01_research_scout
    tasks:
    - name: research_scout
      subagent_type: searcher
      skill_id: research-scout
      inputs:
        query: '{{topic}} {{query}} {{goal}} {{raw_message}}'
        task_focus: 检索并筛选可支撑本任务的权威来源，输出可追溯来源表、Library-ready metadata、claim support 和缺口清单；后续写作只能使用入库后生成的 citation_key。
        capability_name: 文献定位与创新点
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        default_checked: true
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          venue: '{{item.venue}}'
          doi: '{{item.doi}}'
          url: '{{item.url}}'
          abstract: '{{item.abstract}}'
          citation_count: '{{item.citations}}'
          source: '{{item.source}}'
          external_id: '{{item.external_id}}'
          metadata: '{{item.raw}}'
      prompt_template: '{{raw_message}}'
  - name: step_02_literature_synthesizer
    depends_on:
    - step_01_research_scout
    tasks:
    - name: literature_synthesizer
      subagent_type: react
      skill_id: literature-synthesizer
      inputs:
        task_focus: 把检索结果和 Library sources 综合为主题矩阵、gap、related work 分组、claim-evidence-citation plan 和后续全文写作可直接消费的 contribution candidates；所有引用计划必须使用 workspace Library citation_key，不得虚构 key。
        capability_name: 文献定位与创新点
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_source_quality_auditor
    depends_on:
    - step_02_literature_synthesizer
    tasks:
    - name: source_quality_auditor
      subagent_type: react
      skill_id: source-quality-auditor
      inputs:
        task_focus: 审查来源权威性、元数据完整性、时效性、BibTeX readiness 和 claim-source 匹配风险；标出哪些 source 可进入 refs.bib projection，哪些只能作为待核验线索。
        capability_name: 文献定位与创新点
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 文献定位与创新点.md
          doc_kind: review_report
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: ICMJE/IMRaD manuscript preparation, EQUATOR/PRISMA-style reporting-guideline awareness, and reproducibility checks.
    source_notes:
    - ICMJE manuscript sections
    - EQUATOR reporting guideline lookup
    - PRISMA 2020 for systematic reviews when applicable
    - FAIR/TOP reproducibility concepts
