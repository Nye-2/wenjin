schema_version: capability.v2
id: response_to_reviewers
workspace_type: sci
enabled: true
display:
  name: 审稿意见回复
  description: 将 reviewer comments 转为逐条回复和稿件修订建议
  icon: file-pen
  color: blue
  order: 60
  entry_tier: contextual
intent:
  description: 将 reviewer comments 转为逐条回复和稿件修订建议
  trigger_phrases:
  - 审稿意见回复
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 将 reviewer comments 转为逐条回复和稿件修订建议
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户已有 reviewer comments、编辑意见或返修要求，需要逐条回复和修订建议。
  - 用户想把审稿意见转为 response letter、修改计划和稿件改动清单。
  not_for:
  - 只是做投稿前模拟评审，应转向 sci_revision_for_journal。
  - 没有审稿意见，只想选刊，应转向 journal_submission_strategy。
  user_intents:
  - 审稿意见回复
  - response letter
  - 返修策略
  positive_examples:
  - 根据这些 reviewer comments 帮我写逐条回复。
  - 帮我把审稿意见拆成修改计划和回复信。
  - 结合修订稿生成 response letter 和逐条修改说明。
  negative_examples:
  - 这篇文章适合投哪里？
  - 帮我整体润色一下，不涉及审稿意见。
  - reviewer comments 是什么意思？
  minimum_context:
    existing_materials_summary: required
    target_journal: optional
    constraints: optional
  ambiguity:
    overlaps_with:
    - sci_revision_for_journal
    - journal_submission_strategy
    ask_user_when:
    - 用户只说返修但没有提供或确认 reviewer comments 来源。
  clarification:
    ask_when_missing:
      existing_materials_summary: 请把 reviewer comments 或编辑意见贴上来，我会按逐条回复来处理。
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让返修专家拆解审稿意见、生成回复策略和可审阅修改建议。
    clarification_prefix: 可以，我先需要审稿意见文本。
    lightweight_answer_hint: 单条意见的理解可以直接解释，不必启动完整返修流程。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      target_journal:
        type: string
        description: 目标期刊或备选期刊。
      article_type:
        type: string
        description: Original Article/Review/Case Study/Short Communication 等。
      reporting_guideline:
        type: string
        description: 适用 reporting guideline，如 PRISMA、CONSORT、STROBE、ARRIVE、SAGER 等。
      study_design:
        type: string
        description: 实验、观察、建模、综述或方法学研究设计。
      data_assets:
        type: string
        description: 数据、代码、实验记录、图表或补充材料。
      submission_constraints:
        type: string
        description: 字数、图表数量、开放数据、伦理、cover letter 等要求。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: conditional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- reporting_guideline_checked
- imrad_or_journal_structure_respected
- methods_results_discussion_consistent
- data_code_availability_considered
graph_template:
  phases:
  - name: step_01_review_critic
    tasks:
    - name: review_critic
      subagent_type: react
      skill_id: review-critic
      inputs:
        task_focus: 按真实评审人视角做高强度审查，输出分级问题和可执行修改清单。
        capability_name: 审稿意见回复
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_manuscript_writer
    depends_on:
    - step_01_review_critic
    tasks:
    - name: manuscript_writer
      subagent_type: react
      skill_id: manuscript-writer
      inputs:
        task_focus: 基于上游结构与证据写作或修订主稿，缺证据处显式标记。
        capability_name: 审稿意见回复
        capability_goal: produce_workspace_review_package
        workspace_type: sci
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 审稿意见回复.md
          doc_kind: review_response
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: ICMJE/IMRaD manuscript preparation, EQUATOR/PRISMA-style reporting-guideline awareness, and reproducibility checks.
    source_notes:
    - ICMJE manuscript sections
    - EQUATOR reporting guideline lookup
    - PRISMA 2020 for systematic reviews when applicable
    - FAIR/TOP reproducibility concepts
