schema_version: capability.v2
id: math_modeling_paper_pack
workspace_type: math_modeling
enabled: true
display:
  name: 数学建模论文包
  description: 输入赛题后生成建模方案、求解脚本、图表、论文初稿和格式检查包
  icon: sigma
  color: blue
  order: 10
  entry_tier: primary
intent:
  description: 输入赛题后生成建模方案、求解脚本、图表、论文初稿和格式检查包
  trigger_phrases:
  - 数学建模论文
  - 数模论文包
  - 国赛论文
  - CUMCM 论文
  disambiguation: {}
mission:
  goal: produce_or_update_primary_document
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 基于数模赛题尽量一步到位生成可复现论文包、图表和格式检查结果
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户提供数学建模赛题、题目截图/文本、数据附件或想直接生成数模竞赛论文。
  - 用户希望从题面解析、模型建立、求解、图表到 LaTeX 论文一次性推进。
  not_for:
  - 只需要解释某个数学概念或公式，不需要生成竞赛论文包。
  - 只需要普通学位论文或 SCI 论文写作，应选择对应 workspace。
  user_intents:
  - 数模国赛论文
  - 数学建模论文包
  - 建模求解与论文
  positive_examples:
  - 我把数模题目发给你，直接生成完整论文和代码。
  - 按高教社杯数学建模格式写一版论文包。
  - 根据这道 CUMCM 题目完成建模、求解、图表和论文初稿。
  negative_examples:
  - 帮我讲一下线性规划是什么。
  - 只把这段中文翻译成英文摘要。
  - 写一篇普通毕业论文开题报告。
  minimum_context:
    problem_statement: required
    data_assets: optional
    target_format: optional
  ambiguity:
    overlaps_with: []
    ask_user_when:
    - 用户只说想做数模，但没有提供题面、题目图片或题目文本。
  clarification:
    ask_when_missing:
      problem_statement: 请先提供赛题题面、题目截图或可读文本；如果有数据附件也一起放进 workspace。
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让数模团队按题面解析、建模求解、图表和论文格式检查串行推进。
    clarification_prefix: 可以，我先确认赛题内容。
    lightweight_answer_hint: 单个模型或公式问题可以先在 chat 里快速解释。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 赛题名称、问题编号或建模主题。
      query:
        type: string
        description: 需要展开的问题或检索关键词。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 默认按高教社杯全国大学生数学建模竞赛论文规范和系统内 CUMCM 模板。
      audience:
        type: string
        description: 评阅专家、竞赛评审或队内复盘读者。
      constraints:
        type: string
        description: 页数、提交截止时间、禁止事项、是否允许 AI 使用声明等要求。
      existing_materials_summary:
        type: string
        description: 已有思路、模型、代码、草稿、图表或队友分工摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的竞赛规范、模板、学校要求或赛题说明。
      problem_statement:
        type: string
        description: 数学建模赛题题面、问题列表、附件说明或题目图片 OCR 文本。
      data_assets:
        type: string
        description: 数据附件、表格、图片、约束文件或已上传数据路径。
      modeling_preferences:
        type: string
        description: 用户偏好的模型方法、算法路线、复杂度或软件工具。
      ai_use_policy:
        type: string
        description: 竞赛或学校关于 AI 辅助使用、声明或禁用范围的要求。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: required
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 1200
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- cumcm_structure_and_format_checked
- problem_assumptions_explicit
- model_equations_variables_defined
- evidence_figures_code_generated
- figure_scripts_reproducible
- figure_palette_profile_applied
- figure_caption_axis_unit_checked
- no_ai_generated_data_figures
- ai_use_disclosure_or_no_ai_declaration_present
graph_template:
  phases:
  - name: step_01_problem_parser
    tasks:
    - name: problem_parser
      subagent_type: react
      skill_id: task-scope-planner
      inputs:
        task_focus: 解析赛题、问题列表、数据附件、提交物和缺失信息；除题面缺失或不可读外，不因数据不完整中断，需给出明确占位或数据需求提示。
        capability_name: 数学建模论文包
        capability_goal: produce_or_update_primary_document
        workspace_type: math_modeling
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        authoritative_template_id: math_modeling_cumcm2026_paper_pack
        visual_profile_id: math_modeling_cumcm_default
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_modeling_planner
    depends_on:
    - step_01_problem_parser
    tasks:
    - name: modeling_planner
      subagent_type: react
      skill_id: method-design
      inputs:
        task_focus: 为每个问题建立变量、假设、目标函数、约束、求解方法、验证路线和敏感性分析计划。
        capability_name: 数学建模论文包
        capability_goal: produce_or_update_primary_document
        workspace_type: math_modeling
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_sandbox_solver
    depends_on:
    - step_02_modeling_planner
    tasks:
    - name: sandbox_solver
      subagent_type: react
      skill_id: evidence-analyst
      inputs:
        task_focus: 规划并执行可复现求解脚本，输出 /workspace/scripts/solve.py、结果表、参数记录、数据缺失说明和可复现命令。
        capability_name: 数学建模论文包
        capability_goal: produce_or_update_primary_document
        workspace_type: math_modeling
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_04_figure_table_engineer
    depends_on:
    - step_03_sandbox_solver
    tasks:
    - name: figure_table_engineer
      subagent_type: react
      skill_id: figure-engineer
      inputs:
        task_focus: 按 math_modeling_cumcm_default 视觉 profile 生成代码可复现的证据图、表格、visual-manifest.md、caption 和 LaTeX include 路径；禁止 AI 生图伪造数据图。
        capability_name: 数学建模论文包
        capability_goal: produce_or_update_primary_document
        workspace_type: math_modeling
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        visual_profile_id: math_modeling_cumcm_default
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_05_manuscript_writer
    depends_on:
    - step_04_figure_table_engineer
    tasks:
    - name: manuscript_writer
      subagent_type: react
      skill_id: manuscript-writer
      inputs:
        task_focus: 按权威 CUMCM LaTeX 模板写摘要、问题重述、假设、符号说明、模型建立、求解、检验、优缺点和参考文献，并引用已生成图表。
        capability_name: 数学建模论文包
        capability_goal: produce_or_update_primary_document
        workspace_type: math_modeling
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        authoritative_template_id: math_modeling_cumcm2026_paper_pack
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_06_format_compliance_checker
    depends_on:
    - step_05_manuscript_writer
    tasks:
    - name: format_compliance_checker
      subagent_type: react
      skill_id: format-compliance-checker
      inputs:
        task_focus: 检查 CUMCM 结构、摘要独立性、图表编号、公式变量定义、AI 使用声明或未使用声明、可复现脚本和 supporting materials 清单。
        capability_name: 数学建模论文包
        capability_goal: produce_or_update_primary_document
        workspace_type: math_modeling
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 数学建模论文包.md
          doc_kind: math_modeling_paper_pack
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  authoritative_template_id: math_modeling_cumcm2026_paper_pack
  visual_profile_id: math_modeling_cumcm_default
  visual_generation:
    default_route: code_first
    evidence_routes:
    - matplotlib
    - seaborn
    - plotly_static
    - python_schematic
    forbidden_routes:
    - llm_image_data_plot
    - hybrid_ai_data_plot
    figure_output_root: /workspace/outputs/figures/math_modeling
    table_output_root: /workspace/outputs/tables
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: 'CUMCM-first mathematical modeling paper generation: parse problem, build assumptions and equations, run reproducible code, generate code-backed visuals, draft the LaTeX paper, and check AI disclosure or no-AI declaration.'
    source_notes:
    - National Undergraduate Mathematical Modeling Contest paper conventions and CUMCM-style LaTeX template
