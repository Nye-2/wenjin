id: section_revise
workspace_type: thesis
enabled: true
display_name: 章节修订
description: 同行评审视角给章节草稿提修订建议
intent_description: 用户希望修订已有章节
trigger_phrases:
- 修订
- 改章节
- 审稿意见
required_decisions:
- key: manuscript
  ask: 粘贴要修订的章节内容
  type: string
brief_schema:
  type: object
  required:
  - manuscript
  properties:
    manuscript:
      type: string
    focus:
      type: string
      optional: true
graph_template:
  phases:
  - name: review
    tasks:
    - name: critique
      subagent_type: react
      skill_id: peer-reviewer
      inputs:
        manuscript: '{{manuscript}}'
        focus: '{{focus|default(''整体质量'')}}'
      outputs:
      - kind: document
        mapping:
          name: 章节修订建议
          doc_kind: peer_review
          content: '{{output.markdown}}'
ui_meta:
  icon: pen
  color: blue
  order: 5
  stages:
  - id: revise
    label: 修订完善
  follow_up_prompt: 请基于这次写作结果继续指出结构缺口、逻辑断点和下一步最该补写的部分。
runtime:
  mode: compute_agentic
  review_gate: {}
  allowed_paths: []
  requires_sandbox: false
dashboard_meta:
  panel: null
  status_kind: section_revise
