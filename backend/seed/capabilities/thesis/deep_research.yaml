id: deep_research
workspace_type: thesis
enabled: true
display_name: 深度文献调研
description: 围绕主题做系统化文献检索和综述材料生成
intent_description: 用户希望对某个主题做学术性的深度文献调研
trigger_phrases:
- 调研
- 找综述
- 文献综述
- literature review
required_decisions:
- key: topic_scope
  ask: 主题边界是？
  type: string
brief_schema:
  type: object
  required:
  - topic
  properties:
    topic:
      type: string
      description: 调研主题
    year_min:
      type: integer
      optional: true
graph_template:
  phases:
  - name: discover
    tasks:
    - name: search
      subagent_type: searcher
      skill_id: scholar-searcher
      inputs:
        query: '{{topic}}'
        year_min: '{{year_min|default(2019)}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          doi: '{{item.doi}}'
          abstract: '{{item.abstract}}'
  - name: synthesize
    depends_on:
    - discover
    tasks:
    - name: write
      subagent_type: react
      skill_id: literature-reviewer
      inputs:
        topic: '{{topic}}'
        papers: '{{phases.discover.search.output.papers}}'
      outputs:
      - kind: document
        mapping:
          name: '{{topic}} 文献综述'
          doc_kind: literature_review
          content: '{{output.markdown}}'
notes: 适合开题阶段或选题探索
ui_meta:
  icon: search
  color: purple
  order: 0
  stages:
  - id: search
    label: 搜索资料
  - id: analyze
    label: 分析信息
  - id: synthesize
    label: 综合整理
  follow_up_prompt: 请基于这次深度调研继续收敛研究问题，并给出更具体的创新点与验证路径。
