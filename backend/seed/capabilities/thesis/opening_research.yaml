id: opening_research
workspace_type: thesis
enabled: true
display_name: 开题调研
description: 把选题背景整理为开题报告材料
intent_description: 用户希望准备开题材料
trigger_phrases:
- 开题
- 开题报告
- 开题调研
required_decisions:
- key: topic
  ask: 开题主题是？
  type: string
brief_schema:
  type: object
  required:
  - topic
  properties:
    topic:
      type: string
graph_template:
  phases:
  - name: discover
    tasks:
    - name: search
      subagent_type: searcher
      skill_id: scholar-searcher
      inputs:
        query: '{{topic}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          doi: '{{item.doi}}'
  - name: synthesize
    depends_on:
    - discover
    tasks:
    - name: review
      subagent_type: react
      skill_id: literature-reviewer
      inputs:
        topic: '{{topic}}'
        papers: '{{phases.discover.search.output.papers}}'
      outputs:
      - kind: document
        mapping:
          name: '{{topic}} 开题综述'
          doc_kind: literature_review
          content: '{{output.markdown}}'
result_card_template: literature_review
ui_meta:
  icon: file-text
  color: amber
  order: 2
  stages:
  - id: research
    label: 调研背景
  - id: outline
    label: 生成大纲
  - id: refine
    label: 完善内容
  follow_up_prompt: 请基于这次研究报告继续补齐研究意义、可行性和技术路线中的薄弱环节。
