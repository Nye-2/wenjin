id: citation_manage
workspace_type: thesis
version: 1
display_name: 引用文献管理审核
enabled: true

intent_description: 用户希望审核章节中的引用文献，验证其存在性并发现遗漏或不当引用

trigger_phrases:
  - 检查一下引用文献
  - 帮我审核参考文献
  - 查漏补缺参考文献

required_decisions:
  - key: section_title
    ask: "要审核哪个章节的引用？"
    type: string
  - key: audit_focus
    ask: "审核重点是什么？（如：查重、补充新文献、验证引用准确性）"
    type: enum
    enum_values: [verify_existence, find_additions, check_relevance, full_audit]
    default: full_audit

brief_schema:
  type: object
  required: [topic, section_title]
  properties:
    topic:
      type: string
      description: 论文主题
    section_title:
      type: string
      description: 要审核引用的章节标题
    audit_focus:
      type: string
      description: 审核重点类型
    cited_works:
      type: array
      description: 已引用文献列表（标题或 DOI）

graph_template:
  phases:
    - name: discover
      tasks:
        - name: lookup_cited_works
          subagent_type: scholar_searcher
          prompt_template: |
            对论文章节"{{section_title}}"（主题：{{topic}}）的引用文献进行核查。
            审核重点：{{audit_focus}}
            任务：
            1. 搜索章节中已引用的核心文献，验证其实际存在性和基本信息准确性
            2. 搜索该主题下近 5 年内高影响力但可能被遗漏的重要文献
            3. 识别领域内的经典文献和奠基性工作
          tools: [scholar_search]
          outputs:
            - kind: library_item
              iterate_on: "output.papers"
              mapping:
                title: "{{item.title}}"
                authors: "{{item.authors}}"
                year: "{{item.year}}"
                doi: "{{item.doi}}"
                abstract: "{{item.abstract}}"
    - name: analyze
      depends_on: [discover]
      tasks:
        - name: produce_audit_report
          subagent_type: critical_writer
          prompt_template: |
            基于文献查找结果，为论文章节"{{section_title}}"生成引用文献审核报告。
            论文主题：{{topic}}
            审核重点：{{audit_focus}}
            报告应包含：
            1. **验证结果**：已引文献中可确认存在的（√）和无法确认的（？）
            2. **建议补充**：应当引用但目前缺失的重要文献（附简要理由）
            3. **建议删除**：相关性不足或重复引用的文献
            4. **总体评估**：引用文献质量的综合评价和改进建议
            以 Markdown 格式输出审核报告。
          outputs:
            - kind: document
              mapping:
                name: "引用文献审核报告"
                mime_type: "text/markdown"
                storage_path: "{{output.storage_path}}"
                size_bytes: 0
                doc_kind: "audit_report"

system_prompt: |
  你是一位专业的学术引用规范专家，熟悉各学科领域的核心文献和引用标准。
  你的任务是对论文章节的引用文献进行系统审核，帮助研究者确保引用的准确性、
  完整性和相关性，从而提升论文的学术质量和可信度。

result_card_template: literature_review
