id: outline_generate
workspace_type: thesis
enabled: true
display_name: 大纲生成
description: 把研究主题转成论文章节框架和摘要
intent_description: 用户希望生成论文大纲
trigger_phrases:
  - 写大纲
  - 生成大纲
  - 设计框架
required_decisions:
  - key: topic
    ask: "论文主题是？"
    type: string
brief_schema:
  type: object
  required: [topic]
  properties:
    topic: { type: string }
    contributions: { type: string, optional: true }
graph_template:
  phases:
    - name: design
      tasks:
        - name: outline
          subagent_type: react
          skill_id: framework-designer
          inputs:
            topic: "{{topic}}"
            contributions: "{{contributions|default('')}}"
          outputs:
            - kind: document
              mapping:
                name: "{{topic}} 框架"
                doc_kind: framework_outline
                content: "{{output.markdown}}"
result_card_template: framework_outline
