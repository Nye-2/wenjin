schema_version: capability.v2
id: idea_to_thesis_manuscript
workspace_type: thesis
enabled: true
display:
  name: Idea 到论文全文
  description: 根据已确认 idea、材料和格式要求生成或更新完整 thesis manuscript
  icon: file-pen
  color: blue
  order: 10
  entry_tier: primary
intent:
  description: 根据已确认 idea、材料和格式要求生成或更新完整 thesis manuscript
  trigger_phrases:
  - 写全文
  - 根据 idea 写论文
  - 生成论文主稿
  disambiguation: {}
mission:
  goal: produce_or_update_primary_document
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 根据已确认 idea、材料和格式要求生成或更新完整 thesis manuscript
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户已经确认论文 idea、题目或材料，希望生成或更新完整 thesis manuscript。
  - 用户需要把已有大纲、研究材料、数据结果或学校模板整合成主稿。
  not_for:
  - 只是想先做文献和理论准备，应转向 thesis_research_pack。
  - 只处理导师意见或查重风险，应转向 thesis_revision_pass。
  user_intents:
  - 写毕业论文
  - 生成论文全文
  - 更新 thesis 主稿
  positive_examples:
  - 根据这个题目和材料帮我写完整毕业论文初稿。
  - 按学校模板把已有大纲扩展成论文主稿。
  negative_examples:
  - 帮我找这个题目的研究空白。
  - 只帮我修改这一段。
  minimum_context:
    topic: required
    target_format: optional
    existing_materials_summary: optional
  ambiguity:
    overlaps_with:
    - thesis_research_pack
    - thesis_revision_pass
    ask_user_when:
    - 用户只给宽泛选题，不清楚是先研究定位还是直接写全文。
  clarification:
    ask_when_missing:
      topic: 你希望围绕哪个论文题目或具体 idea 来生成主稿？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让论文写作团队按 thesis 主稿目标推进结构、证据和可审阅修改。
    clarification_prefix: 可以，我先确认论文题目。
    lightweight_answer_hint: 局部段落改写可以直接在 chat 里完成。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      degree_level:
        type: string
        description: 本科/硕士/博士或专业学位类型。
      school_template:
        type: string
        description: 学校/学院论文模板或格式规范。
      chapter_requirements:
        type: string
        description: 章节数量、摘要、创新点、致谢、附录等要求。
      citation_style:
        type: string
        description: 参考文献格式，如 GB/T 7714 或学校要求。
      methodology:
        type: string
        description: 研究方法、数据来源或实证设计。
      data_assets:
        type: string
        description: 可用数据、代码、图表或访谈材料。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: conditional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- thesis_structure_matches_school_template
- chapter_claims_have_evidence
- abstract_matches_body
- references_follow_target_style
graph_template:
  phases:
  - name: step_01_manuscript_architect
    tasks:
    - name: manuscript_architect
      subagent_type: react
      skill_id: manuscript-architect
      inputs:
        task_focus: 建立章节结构、论证链、section contract、claim-evidence-citation plan。
        capability_name: Idea 到论文全文
        capability_goal: produce_or_update_primary_document
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_evidence_analyst
    depends_on:
    - step_01_manuscript_architect
    tasks:
    - name: evidence_analyst
      subagent_type: react
      skill_id: evidence-analyst
      inputs:
        task_focus: 规划或核验数据、实验、代码、截图和量化结论，标明可复现证据与限制。
        capability_name: Idea 到论文全文
        capability_goal: produce_or_update_primary_document
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_manuscript_writer
    depends_on:
    - step_02_evidence_analyst
    tasks:
    - name: manuscript_writer
      subagent_type: react
      skill_id: manuscript-writer
      inputs:
        task_focus: 基于上游结构与证据写作或修订主稿，缺证据处显式标记。
        capability_name: Idea 到论文全文
        capability_goal: produce_or_update_primary_document
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: prism_file_change
        default_checked: true
        mapping:
          logical_key: project:main
          path: main.tex
          reason: feature_proposal
          pending_content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
  - name: step_04_citation_auditor
    depends_on:
    - step_03_manuscript_writer
    tasks:
    - name: citation_auditor
      subagent_type: react
      skill_id: citation-auditor
      inputs:
        task_focus: 审查文本中的事实/方法/数值论断是否有可靠来源支撑，并给出修正建议。
        capability_name: Idea 到论文全文
        capability_goal: produce_or_update_primary_document
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: GB/T 7713.1-style thesis structure plus school-template compliance, claim-evidence writing, and citation hygiene.
    source_notes:
    - GB/T 7713.1-2025 thesis writing-rule structure
    - GB/T 7714-style reference discipline when requested
