schema_version: capability.v2
id: thesis_revision_pass
workspace_type: thesis
enabled: true
display:
  name: 论文整体修订
  description: 按导师意见、查重风险、逻辑一致性或格式要求修订全文
  icon: file-pen
  color: blue
  order: 40
  entry_tier: primary
intent:
  description: 按导师意见、查重风险、逻辑一致性或格式要求修订全文
  trigger_phrases:
  - 论文整体修订
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 按导师意见、查重风险、逻辑一致性或格式要求修订全文
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户已有 thesis 主稿，需要按导师意见、查重风险、逻辑一致性或格式要求修订全文。
  - 用户希望对论文做整体降重、降 AI 味、结构调整或质量提升。
  not_for:
  - 只需要生成答辩材料，应转向 thesis_defense_pack。
  - 只需要文献格式治理，应转向 thesis_reference_curation。
  user_intents:
  - 论文整体修订
  - 导师意见修改
  - 降重降 AI
  positive_examples:
  - 按导师意见帮我整体修订论文。
  - 这篇论文逻辑不顺，帮我做全文修改。
  - 根据批注系统调整论文结构、论证和表达。
  negative_examples:
  - 根据论文生成答辩 PPT 和问答。
  - 只帮我检查参考文献格式。
  - 帮我把这一段改得更通顺。
  minimum_context:
    existing_materials_summary: required
    constraints: optional
    target_format: optional
  ambiguity:
    overlaps_with:
    - idea_to_thesis_manuscript
    - thesis_defense_pack
    ask_user_when:
    - 用户同时提到写全文和修订全文，但没有说明是否已有主稿。
  clarification:
    ask_when_missing:
      existing_materials_summary: 你希望我基于当前 Prism 主稿修订，还是有导师意见/查重报告需要补充？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让论文修订团队按导师意见、逻辑和格式做一轮可审阅修订。
    clarification_prefix: 可以，我先确认修订依据。
    lightweight_answer_hint: 单段或一句话修改可以直接在 chat 里处理。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      degree_level:
        type: string
        description: 本科/硕士/博士或专业学位类型。
      school_template:
        type: string
        description: 学校/学院论文模板或格式规范。
      chapter_requirements:
        type: string
        description: 章节数量、摘要、创新点、致谢、附录等要求。
      citation_style:
        type: string
        description: 参考文献格式，如 GB/T 7714 或学校要求。
      methodology:
        type: string
        description: 研究方法、数据来源或实证设计。
      data_assets:
        type: string
        description: 可用数据、代码、图表或访谈材料。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: conditional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- thesis_structure_matches_school_template
- chapter_claims_have_evidence
- abstract_matches_body
- references_follow_target_style
graph_template:
  phases:
  - name: step_01_review_critic
    tasks:
    - name: review_critic
      subagent_type: react
      skill_id: review-critic
      inputs:
        task_focus: 按真实评审人视角做高强度审查，输出分级问题和可执行修改清单。
        capability_name: 论文整体修订
        capability_goal: produce_workspace_review_package
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_02_manuscript_writer
    depends_on:
    - step_01_review_critic
    tasks:
    - name: manuscript_writer
      subagent_type: react
      skill_id: manuscript-writer
      inputs:
        task_focus: 基于上游结构与证据写作或修订主稿，缺证据处显式标记。
        capability_name: 论文整体修订
        capability_goal: produce_workspace_review_package
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_citation_auditor
    depends_on:
    - step_02_manuscript_writer
    tasks:
    - name: citation_auditor
      subagent_type: react
      skill_id: citation-auditor
      inputs:
        task_focus: 审查文本中的事实/方法/数值论断是否有可靠来源支撑，并给出修正建议。
        capability_name: 论文整体修订
        capability_goal: produce_workspace_review_package
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 论文修订审校报告.md
          doc_kind: review_report
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: GB/T 7713.1-style thesis structure plus school-template compliance, claim-evidence writing, and citation hygiene.
    source_notes:
    - GB/T 7713.1-2025 thesis writing-rule structure
    - GB/T 7714-style reference discipline when requested
