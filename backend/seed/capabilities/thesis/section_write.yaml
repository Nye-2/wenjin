id: section_write
workspace_type: thesis
enabled: true
display_name: 章节撰写
description: 基于大纲和参考资料撰写指定章节草稿
intent_description: 用户需要写论文的某个章节
trigger_phrases:
- 写章节
- 写引言
- 写方法
- 写正文
required_decisions:
- key: section_title
  ask: 要写哪个章节？
  type: string
brief_schema:
  type: object
  required:
  - section_title
  properties:
    section_title:
      type: string
    outline:
      type: string
      optional: true
    target_words:
      type: integer
      optional: true
graph_template:
  phases:
  - name: write
    tasks:
    - name: draft
      subagent_type: react
      skill_id: section-writer
      inputs:
        section_title: '{{section_title}}'
        outline: '{{outline|default('''')}}'
        references: ''
        target_words: '{{target_words|default(800)}}'
      outputs:
      - kind: document
        mapping:
          name: '{{section_title}} 草稿'
          doc_kind: section_draft
          content: '{{output.markdown}}'
ui_meta:
  icon: pen
  color: blue
  order: 4
  stages:
  - id: write
    label: 撰写内容
  follow_up_prompt: 请基于这次写作结果继续指出结构缺口、逻辑断点和下一步最该补写的部分。
runtime:
  mode: compute_agentic
  review_gate: {}
  allowed_paths: []
  requires_sandbox: false
dashboard_meta:
  panel: null
  hidden: true
  status_kind: section_write
