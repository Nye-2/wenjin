schema_version: capability.v2
id: thesis_research_pack
workspace_type: thesis
enabled: true
display:
  name: 论文研究包
  description: 围绕题目建立文献、理论、研究空白和可用材料包
  icon: file-pen
  color: blue
  order: 20
  entry_tier: primary
intent:
  description: 围绕题目建立文献、理论、研究空白和可用材料包
  trigger_phrases:
  - 论文研究包
  disambiguation: {}
mission:
  goal: produce_workspace_review_package
  primary_surface: prism
  document_role: primary_manuscript
  user_promise: 围绕题目建立文献、理论、研究空白和可用材料包
  allowed_deliverables:
  - full_document_update
  - evidence_pack
  - review_report
routing:
  when_to_use:
  - 用户需要围绕论文题目建立文献、理论基础、研究空白和可用材料包。
  - 用户处在选题、开题或写作前期，希望先把研究依据梳理清楚。
  not_for:
  - 已经明确要直接生成完整论文主稿，应转向 idea_to_thesis_manuscript。
  - 只需要清洗参考文献格式，应转向 thesis_reference_curation。
  user_intents:
  - 论文研究包
  - 文献综述准备
  - 研究空白梳理
  positive_examples:
  - 围绕这个论文题目帮我整理文献和理论基础。
  - 帮我先做一个开题前的研究材料包。
  negative_examples:
  - 直接帮我写完整毕业论文。
  - 把这些参考文献按 GB/T 7714 整理一下。
  minimum_context:
    topic: required
    target_format: optional
    existing_materials_summary: optional
  ambiguity:
    overlaps_with:
    - idea_to_thesis_manuscript
    - thesis_reference_curation
    ask_user_when:
    - 用户同时表达找资料和写全文，但没有说明先研究包还是直接成稿。
  clarification:
    ask_when_missing:
      topic: 你的论文题目或大致研究方向是什么？
    choice_when_ambiguous: {}
  user_guidance:
    launch_intro: 我会让论文研究团队先整理文献、理论、gap 和后续写作素材。
    clarification_prefix: 可以，我先确认论文方向。
    lightweight_answer_hint: 简单选题讨论可以先在 chat 里快速分析。
inputs:
  required_decisions: []
  brief_schema:
    type: object
    properties:
      goal:
        type: string
      deliverable:
        type: string
      topic:
        type: string
        description: 核心主题、题目或技术方向。
      query:
        type: string
        description: 检索关键词或需要展开的问题。
      raw_message:
        type: string
        description: 用户原始请求文本。
      target_format:
        type: string
        description: 学校、期刊、基金、软著或专利模板要求。
      audience:
        type: string
        description: 目标读者、评审人或审查场景。
      constraints:
        type: string
        description: 页数、语言、截止日期、格式和禁止事项。
      existing_materials_summary:
        type: string
        description: 已有文献、数据、代码、草稿或证明材料摘要。
      source_guidelines:
        type: array
        items:
          type: string
        description: 用户指定或系统识别的规范、指南、标准或官方来源。
      degree_level:
        type: string
        description: 本科/硕士/博士或专业学位类型。
      school_template:
        type: string
        description: 学校/学院论文模板或格式规范。
      chapter_requirements:
        type: string
        description: 章节数量、摘要、创新点、致谢、附录等要求。
      citation_style:
        type: string
        description: 参考文献格式，如 GB/T 7714 或学校要求。
      methodology:
        type: string
        description: 研究方法、数据来源或实证设计。
      data_assets:
        type: string
        description: 可用数据、代码、图表或访谈材料。
context_policy:
  room_reads:
    library: summary
    documents: excerpts
    decisions: full
    memory: relevant
    tasks: related
  prism_context:
    include_outline: true
    include_target_files: true
    include_protected_sections: true
    include_pending_review_summary: true
  full_text_access: explicit_tool_only
sandbox_policy:
  mode: optional
  profiles:
  - analysis
  - visualization
  allowed_operations:
  - run_python
  - install_python_packages
  - render_figures
  - compile_latex
  isolation:
    provider: docker
    network: default_deny_allowlist
    allow_host_docker_socket: false
    allow_docker_socket: false
    allow_privileged: false
    allow_host_network: false
    allow_host_paths: false
    allow_sibling_containers: false
    allow_sibling_container_access: false
    allow_server_control: false
  resource_limits:
    cpu: 2
    memory_mb: 4096
    timeout_seconds: 900
    max_output_mb: 512
  artifact_policy:
    review_required: true
    capture_stdout: true
    capture_scripts: true
    capture_input_hashes: true
review_policy:
  default_targets:
  - prism_file_change
  - sandbox_artifact
  - room_decision_candidate
  - room_memory_candidate
  - room_task
  require_user_acceptance: true
  allow_bulk_accept: true
quality_gates:
- no_direct_primary_document_write
- provenance_required_for_claims
- protected_sections_readonly
- upstream_outputs_must_be_used
- unsupported_claims_marked_for_user_decision
- result_card_review_before_commit
- thesis_structure_matches_school_template
- chapter_claims_have_evidence
- abstract_matches_body
- references_follow_target_style
graph_template:
  phases:
  - name: step_01_research_scout
    tasks:
    - name: research_scout
      subagent_type: searcher
      skill_id: research-scout
      inputs:
        query: '{{topic}} {{query}} {{goal}} {{raw_message}}'
        task_focus: 检索并筛选可支撑本任务的权威来源，输出可追溯来源表和缺口清单。
        capability_name: 论文研究包
        capability_goal: produce_workspace_review_package
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
      outputs:
      - kind: library_item
        iterate_on: output.papers
        default_checked: true
        mapping:
          title: '{{item.title}}'
          authors: '{{item.authors}}'
          year: '{{item.year}}'
          venue: '{{item.venue}}'
          doi: '{{item.doi}}'
          url: '{{item.url}}'
          abstract: '{{item.abstract}}'
          citation_count: '{{item.citations}}'
          source: '{{item.source}}'
          external_id: '{{item.external_id}}'
          metadata: '{{item.raw}}'
      prompt_template: '{{raw_message}}'
  - name: step_02_literature_synthesizer
    depends_on:
    - step_01_research_scout
    tasks:
    - name: literature_synthesizer
      subagent_type: react
      skill_id: literature-synthesizer
      inputs:
        task_focus: 把检索结果和材料综合为主题矩阵、gap、可引用论断和后续写作素材。
        capability_name: 论文研究包
        capability_goal: produce_workspace_review_package
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs: []
      prompt_template: '{{raw_message}}'
  - name: step_03_source_quality_auditor
    depends_on:
    - step_02_literature_synthesizer
    tasks:
    - name: source_quality_auditor
      subagent_type: react
      skill_id: source-quality-auditor
      inputs:
        task_focus: 审查来源权威性、元数据完整性、时效性和 claim-source 匹配风险。
        capability_name: 论文研究包
        capability_goal: produce_workspace_review_package
        workspace_type: thesis
        raw_message: '{{raw_message}}'
        target_format: '{{target_format}}'
        upstream_outputs: '{{phases}}'
      outputs:
      - kind: document
        default_checked: true
        mapping:
          name: 论文研究资料包.md
          doc_kind: research_pack
          content: '{{output.text}}'
      prompt_template: '{{raw_message}}'
extensions:
  content_strategy:
    workflow_pattern: sequential_upstream_context
    strategy: GB/T 7713.1-style thesis structure plus school-template compliance, claim-evidence writing, and citation hygiene.
    source_notes:
    - GB/T 7713.1-2025 thesis writing-rule structure
    - GB/T 7714-style reference discipline when requested
