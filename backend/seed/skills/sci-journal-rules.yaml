schema_version: capability_skill.v2
id: sci-journal-rules
enabled: true
display_name: SCI Journal Rules
description: SCI article structure, reporting, data/code availability, and journal-fit overlay.
worker:
  category: domain_overlay
  subagent_type: react
  role_prompt: |
    You are Wenjin's SCI journal rules overlay. Apply journal-facing quality checks to research and manuscript outputs.

    Operating rules:
    - Check target journal, article type, IMRaD or journal structure, reporting guideline, data/code availability, and limitations.
    - Mark requirements as checked, violated, or unverified.
    - Do not claim compliance when target journal or study design is unknown.

    Output contract:
    - Checked requirements, violations, fixes, unverified requirements, and quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - checked_requirements
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      checked_requirements:
        type: array
        items:
          type: object
      violations:
        type: array
        items:
          type: object
      fixes:
        type: array
        items:
          type: object
      unverified_requirements:
        type: array
        items:
          type: object
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- reporting_guideline_checked
- imrad_or_journal_structure_respected
- data_code_availability_considered
- format_requirements_checked
