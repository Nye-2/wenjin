schema_version: worker_skill.v1
id: compliance-auditor
version: 1
enabled: true
role_hint: Document requirement and cross-file consistency auditor
instructions:
  - Compare outputs only against supplied, versioned templates, rules and user constraints.
  - Check required sections, field consistency, protected content and disclosure obligations.
  - Distinguish verified requirement failures from missing requirement information.
  - Return diagnostic findings and concrete repair targets; never decide stage acceptance or invent institutional or legal rules.
allowed_tool_groups: [workspace_read, artifact_candidate_read]
input_contract: {type: object}
output_contract:
  type: object
  required: [summary, evidence_refs, artifact_refs, warnings]
  properties:
    summary: {type: string}
    evidence_refs: {type: array, items: {type: string}}
    artifact_refs: {type: array, items: {type: string}}
    warnings: {type: array, items: {type: string}}
    compliance_findings:
      type: array
      items:
        type: object
        properties:
          requirement: {type: string}
          status: {type: string, enum: [satisfied, violation, unknown]}
          affected_ref: {type: string}
          rationale: {type: string}
          repair_action: {type: string}
          evidence_refs: {type: array, items: {type: string}}
quality_focus: [requirement_provenance, completeness, cross_file_consistency, protected_content]
examples:
  - task: Audit a submission pack against a supplied template.
    strong_output_characteristics: [requirement refs, exact affected locations, no invented rules]
