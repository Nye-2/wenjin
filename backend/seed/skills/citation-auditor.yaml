schema_version: capability_skill.v2
id: citation-auditor
enabled: true
display_name: Citation Auditor
description: Check claim-source binding and citation gaps.
worker:
  category: review
  subagent_type: react
  role_prompt: |
    You are Wenjin's citation auditor. Check claim-source binding, reference integrity, and citation style; return reviewable outputs only and never write workspace canonical state directly.

    Operating rules:
    - Inspect every factual, methodological, numerical, legal, and comparative claim. Classify it as supported, weakly supported, unsupported, contradicted, or not needing citation.
    - When `library_context.citation_keys` is present, verify every LaTeX `\cite{...}` key against that list and flag any citation that is missing from the workspace Library.
    - Treat `refs.bib` as a projection from Workspace Library, not as an independent manuscript source. If a citation key is absent from Library, it is a blocking issue even if the prose looks plausible.
    - Detect fabricated or incomplete references, DOI/title mismatches, duplicated sources, stale standards, missing page ranges, and style inconsistencies.
    - Match citation style to the workspace: school/GB/T 7714 or local thesis rules for thesis, target journal style for SCI, funder/call style for proposals, official-rule citation for software copyright and patent materials.
    - Do not silently fix claims by inventing citations. Recommend replacement sources or wording changes.

    Output contract:
    - Claim-source audit table.
    - Reference cleanup list.
    - Unsupported claim and missing Library citation-key risk list.
    - Suggested edits grouped by severity.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - citation_key_audit
    - fabrication_risks
    properties:
      text:
        type: string
      decision_candidates:
        type: array
        items:
          type: object
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      citation_key_audit:
        type: array
        items:
          type: object
          required:
          - claim_id
          - citation_key
          - status
          - evidence_refs
          properties:
            claim_id:
              type: string
            claim_text:
              type: string
            citation_key:
              type: string
            status:
              type: string
              enum:
              - supported
              - weakly_supported
              - unsupported
              - contradicted
              - missing_from_library
              - not_needing_citation
            evidence_refs:
              type: array
              items:
                type: object
                required:
                - ref_type
                - ref_id
                properties:
                  ref_type:
                    type: string
                  ref_id:
                    type: string
                  note:
                    type: string
            required_fix:
              type: string
      missing_sources:
        type: array
        items:
          type: object
          required:
          - claim_id
          - claim_text
          - required_source
          properties:
            claim_id:
              type: string
            claim_text:
              type: string
            required_source:
              type: string
            suggested_query:
              type: string
      fabrication_risks:
        type: array
        items:
          type: object
          required:
          - citation_key
          - risk
          - required_fix
          properties:
            citation_key:
              type: string
            risk:
              type: string
            required_fix:
              type: string
            severity:
              type: string
      bibtex_projection_notes:
        type: array
        items:
          type: object
          required:
          - citation_key
          - note
          properties:
            citation_key:
              type: string
            note:
              type: string
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- no_direct_primary_document_write
- no_fabricated_citations
- claim_source_binding_checked
- style_consistency_checked
