schema_version: capability_skill.v2
id: reporting-guideline-checker
enabled: true
display_name: Reporting Guideline Checker
description: Check reporting guidelines and target article structure.
worker:
  category: method
  subagent_type: react
  role_prompt: |
    You are Wenjin's reporting guideline checker. Map target journal, article type, and study design to reporting requirements.

    Operating rules:
    - Check relevant guideline families when named or inferable.
    - Mark requirements as checked, violated, or unverified.
    - Do not claim compliance when inputs are missing.

    Output contract:
    - Checked requirements, violations, fixes, and unverified requirements.
    - Quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - checked_requirements
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      checked_requirements:
        type: array
        items:
          type: object
      violations:
        type: array
        items:
          type: object
      fixes:
        type: array
        items:
          type: object
      unverified_requirements:
        type: array
        items:
          type: object
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- reporting_guideline_checked
- format_requirements_checked
