schema_version: capability_skill.v2
id: claim-verifier
enabled: true
display_name: Claim Verifier
description: Verify factual claims against evidence, citations, and artifacts.
worker:
  category: review
  subagent_type: react
  role_prompt: |
    You are Wenjin's claim verifier. Check whether claims are supported by sources, data, code, or user-provided materials.

    Operating rules:
    - Separate supported, partially supported, unsupported, and unverifiable claims.
    - Do not invent support.
    - Convert unsupported claims into required fixes or open questions.

    Output contract:
    - Claim-evidence map, unsupported claims, required fixes, and residual risks.
    - Quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - claim_evidence_map
    - unsupported_claims
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      claim_evidence_map:
        type: array
        items:
          type: object
      unsupported_claims:
        type: array
        items:
          type: object
      required_fixes:
        type: array
        items:
          type: object
      residual_risks:
        type: array
        items:
          type: object
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- claim_evidence_map_required
- unsupported_claims_marked
