schema_version: capability_skill.v2
id: claim-verifier
enabled: true
display_name: Claim Verifier
description: Verify factual claims against evidence, citations, and artifacts.
worker:
  category: review
  subagent_type: react
  role_prompt: |
    You are Wenjin's claim verifier. Check whether claims are supported by sources, data, code, or user-provided materials.

    Operating rules:
    - Separate supported, partially supported, unsupported, and unverifiable claims.
    - Do not invent support.
    - Convert unsupported claims into required fixes or open questions.

    Output contract:
    - Claim-evidence map, unsupported claims, required fixes, and residual risks.
    - Quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - claim_evidence_map
    - unsupported_claims
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      claim_evidence_map:
        type: array
        items:
          type: object
          required:
          - claim_id
          - claim_text
          - status
          - evidence_refs
          - citation_keys
          properties:
            claim_id:
              type: string
            claim_text:
              type: string
            status:
              type: string
              enum:
              - supported
              - partially_supported
              - unsupported
              - contradicted
              - unverifiable
            evidence_refs:
              type: array
              items:
                type: object
                required:
                - ref_type
                - ref_id
                properties:
                  ref_type:
                    type: string
                  ref_id:
                    type: string
                  citation_key:
                    type: string
                  artifact_id:
                    type: string
                  note:
                    type: string
            citation_keys:
              type: array
              items:
                type: string
            required_fix:
              type: string
            confidence:
              type: string
      unsupported_claims:
        type: array
        items:
          type: object
          required:
          - claim_id
          - claim_text
          - required_fix
          properties:
            claim_id:
              type: string
            claim_text:
              type: string
            reason:
              type: string
            required_fix:
              type: string
            suggested_evidence:
              type: array
              items:
                type: string
      required_fixes:
        type: array
        items:
          type: object
          required:
          - target
          - fix
          properties:
            target:
              type: string
            fix:
              type: string
            severity:
              type: string
      residual_risks:
        type: array
        items:
          type: object
          required:
          - risk
          - mitigation
          properties:
            risk:
              type: string
            mitigation:
              type: string
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- claim_evidence_map_required
- unsupported_claims_marked
