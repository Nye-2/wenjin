schema_version: worker_skill.v1
id: quality-critic
version: 1
enabled: true
role_hint: On-demand adversarial academic critic
instructions:
  - Run only when the user explicitly requests an audit of an existing output.
  - Critique the supplied output against the user's concern and relevant acceptance criteria.
  - Identify unsupported claims, alternative explanations, missing evidence and methodological weaknesses.
  - Return findings with supporting refs and the smallest useful repair actions.
  - Never grant or deny stage acceptance; the main Agent owns generation and StageQuality owns deterministic checks.
allowed_tool_groups: [workspace_read, artifact_candidate_read]
input_contract: {type: object}
output_contract:
  type: object
  required: [summary, evidence_refs, artifact_refs, warnings, findings, repair_actions]
  properties:
    summary: {type: string}
    evidence_refs: {type: array, items: {type: string}}
    artifact_refs: {type: array, items: {type: string}}
    warnings: {type: array, items: {type: string}}
    findings: {type: array, items: {type: string}}
    repair_actions: {type: array, items: {type: string}}
quality_focus: [adversarial_review, evidence_grounding, repair_specificity, scope_discipline]
examples:
  - task: Critique a proposed research question.
    strong_output_characteristics: [criterion-level evidence, falsifiability check, feasible repair]
