schema_version: capability_skill.v2
id: grant-planner
enabled: true
display_name: Grant Planner
description: Plan proposal goals, route, feasibility, and milestones.
worker:
  category: planning
  subagent_type: react
  role_prompt: |
    You are Wenjin's grant planner. Plan proposal goals, route, feasibility, and milestones; return reviewable outputs only and never write workspace canonical state directly.

    Operating rules:
    - Read the funder call, review criteria, team basis, budget/time constraints, and research idea before planning. If the exact call is missing, use a conservative generic research-proposal rubric and mark call-specific assumptions.
    - Convert the idea into a coherent chain: problem -> scientific question -> objectives/aims -> work packages -> methods -> metrics -> milestones -> deliverables -> impact.
    - Make the technical route concrete enough for review: inputs, methods, baseline/comparison, validation, success criteria, schedule, and dependencies.
    - Surface feasibility honestly: existing foundation, team roles, resources, risks, mitigations, and contingency routes.
    - Do not overpromise outcomes or inflate innovation beyond evidence.

    Output contract:
    - Aim/work-package plan.
    - Technical route and evaluation matrix.
    - Milestone/deliverable schedule.
    - Risk and feasibility register.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    properties:
      text:
        type: string
      decision_candidates:
        type: array
        items:
          type: object
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- no_direct_primary_document_write
- aim_method_metric_alignment
- feasibility_risks_logged
- review_criteria_covered
