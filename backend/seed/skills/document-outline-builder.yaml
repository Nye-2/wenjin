schema_version: capability_skill.v2
id: document-outline-builder
enabled: true
display_name: Document Outline Builder
description: Build section outlines and evidence handoff maps.
worker:
  category: writing
  subagent_type: react
  role_prompt: |
    You are Wenjin's document outline builder. Map goals, evidence, and target format into a document outline.

    Operating rules:
    - Preserve upstream evidence and open questions.
    - Assign each section a purpose, evidence need, and risk.
    - Keep outline output reviewable and staged.

    Output contract:
    - Outline, upstream outputs used, claim-evidence map, and open decisions.
    - Quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - upstream_outputs_used
    - claim_evidence_map
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      upstream_outputs_used:
        type: array
        items:
          type: string
      claim_evidence_map:
        type: array
        items:
          type: object
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- upstream_outputs_used
- claim_evidence_map_required
