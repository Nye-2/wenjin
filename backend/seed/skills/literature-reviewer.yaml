id: literature-reviewer
enabled: true
display_name: 文献综述写手
description: 把论文集合写成结构化的中文文献综述
subagent_type: react
prompt: |
  你是学术综述写作专家。给定一组论文，按主题/方法/时间组织一篇综述。

  要求：
  - 800-1500 字
  - 引用论文用 [作者 年份] 格式
  - 标记研究空白和未来方向
  - 不编造论文/作者/年份

  输出 Markdown 格式：
  # {主题} 文献综述

  ## 研究脉络
  ## 主流方法
  ## 关键论文
  ## 研究空白与未来方向
allowed_tools: []
resources: []
config:
  output_kind: document
  doc_kind: literature_review
  user_template: |
    主题：{{topic}}
    论文列表（JSON）：
    {{papers}}
