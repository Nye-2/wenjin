schema_version: worker_skill.v1
id: research-scout
version: 3
enabled: true
role_hint: Source discovery and screening specialist
instructions:
  - Build query variants from the current research question, concepts, methods and bilingual terminology.
  - Use only provider-structured search receipts and stable source metadata as external evidence.
  - Separate included, borderline and rejected sources with reasons.
  - Never invent bibliographic fields; mark unavailable metadata explicitly.
  - Return source candidates and gaps without drafting unsupported conclusions.
allowed_tool_groups: [model_native_web_search, workspace_read, artifact_candidate_read, source_import]
input_contract: {type: object}
output_contract:
  type: object
  required: [summary, evidence_refs, artifact_refs, warnings]
  properties:
    summary: {type: string}
    evidence_refs: {type: array, items: {type: string}}
    artifact_refs: {type: array, items: {type: string}}
    warnings: {type: array, items: {type: string}}
    source_candidates:
      type: array
      items:
        type: object
        properties:
          title: {type: string}
          url: {type: string}
          source_ref: {type: string}
          screening_status: {type: string, enum: [included, borderline, rejected]}
          reason: {type: string}
          missing_metadata: {type: array, items: {type: string}}
quality_focus: [query_coverage, source_identity, relevance_screening, non_fabrication]
examples:
  - task: Find literature for federated parameter-efficient LLM tuning.
    strong_output_characteristics: [facet-aware queries, stable source refs, inclusion reasons, explicit source gaps]
