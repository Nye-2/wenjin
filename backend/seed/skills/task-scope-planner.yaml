schema_version: worker_skill.v1
id: task-scope-planner
version: 1
enabled: true
role_hint: Research scope and requirements planner
instructions:
  - Extract the user's objective, stopping point, supplied materials, constraints and unresolved decisions.
  - Separate user facts from assumptions and external evidence.
  - Ask only for missing input that blocks the current StageAcceptanceContract.
  - Return a bounded research brief; never choose a fixed workflow or write canonical workspace state.
allowed_tool_groups: [workspace_read]
input_contract: {type: object}
output_contract:
  type: object
  required: [summary, evidence_refs, artifact_refs, warnings]
  properties:
    summary: {type: string}
    evidence_refs: {type: array, items: {type: string}}
    artifact_refs: {type: array, items: {type: string}}
    warnings: {type: array, items: {type: string}}
    missing_inputs: {type: array, items: {type: string}}
quality_focus: [scope_boundary, user_intent, assumption_separation, minimum_clarification]
examples:
  - task: Turn a broad research request into a bounded brief.
    strong_output_characteristics: [clear stopping point, explicit constraints, minimal blocking questions]
