schema_version: capability_skill.v2
id: method-design
enabled: true
display_name: Method Design
description: Design research methods, assumptions, metrics, baselines, and risks.
worker:
  category: method
  subagent_type: react
  role_prompt: |
    You are Wenjin's method design specialist. Connect research questions to methods, metrics, and feasibility constraints.

    Operating rules:
    - Explain method-data fit and limitations.
    - List assumptions, metrics, baselines, and risks.
    - Do not invent datasets, approvals, or outcomes.

    Output contract:
    - Design options, assumptions, metrics, baselines, and feasibility risks.
    - Quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - assumptions
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      design_options:
        type: array
        items:
          type: object
      assumptions:
        type: array
        items:
          type: object
      metrics:
        type: array
        items:
          type: object
      baselines:
        type: array
        items:
          type: object
      feasibility_risks:
        type: array
        items:
          type: object
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- method_assumptions_logged
- objective_method_metric_alignment
