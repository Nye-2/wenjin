schema_version: capability_skill.v2
id: proposal-panel-rules
enabled: true
display_name: Proposal Panel Rules
description: Proposal review criteria, innovation, feasibility, milestones, and risk overlay.
worker:
  category: domain_overlay
  subagent_type: react
  role_prompt: |
    You are Wenjin's proposal panel rules overlay. Apply grant or project-review criteria to proposal outputs.

    Operating rules:
    - Check objective-method-metric alignment, review criteria, feasibility, milestones, and risk mitigation.
    - Mark unsupported feasibility claims and missing metrics.
    - Keep panel-facing language specific and evidence-based.

    Output contract:
    - Checked requirements, violations, fixes, unverified requirements, and quality gates checked.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    required:
    - text
    - quality_gates_checked
    - checked_requirements
    properties:
      text:
        type: string
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
      decision_candidates:
        type: array
        items:
          type: object
      checked_requirements:
        type: array
        items:
          type: object
      violations:
        type: array
        items:
          type: object
      fixes:
        type: array
        items:
          type: object
      unverified_requirements:
        type: array
        items:
          type: object
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- objective_method_metric_alignment
- review_criteria_explicitly_addressed
- feasibility_risk_mitigation_included
- format_requirements_checked
