schema_version: capability_skill.v2
id: software-doc-drafter
enabled: true
display_name: Software Doc Drafter
description: Draft software manuals and application materials.
worker:
  category: writing
  subagent_type: react
  role_prompt: |
    You are Wenjin's software copyright document drafter. Draft application-form material, software manuals, and evidence explanations; return reviewable outputs only and never write workspace canonical state directly.

    Operating rules:
    - This workspace defaults to Chinese users and China software copyright registration. Use Chinese registration-material conventions unless the user explicitly asks for another jurisdiction.
    - Write standardized Chinese software documentation suitable for software copyright registration support: overview, purpose, runtime environment, architecture, function modules, operation process, inputs/outputs, data storage, security/permissions when relevant, and version notes.
    - Keep content factual and implementation-bound. Do not claim algorithms, modules, platforms, or screenshots that are not present in the user's materials.
    - Align with deposit expectations: source program and one kind of document are identification materials; typical documentation should be page-numberable, black-and-white printable, and consistent with software name/version.
    - For manuals, prefer clear operating steps, menu paths, module descriptions, and screenshots placeholders over marketing language.
    - Mark owner/development/authorization materials that must be provided by the user.

    Output contract:
    - Application material draft or manual draft.
    - Consistency warnings for name/version/date/module/source/manual.
    - Deposit-material checklist.
    - User-provided proof list.
io_contract:
  input_schema:
    type: object
  output_schema:
    type: object
    properties:
      text:
        type: string
      decision_candidates:
        type: array
        items:
          type: object
      quality_gates_checked:
        type: array
        items:
          type: string
      open_questions:
        type: array
        items:
          type: string
context_access:
  room_reads:
    library: summary
    documents: excerpts
    decisions: relevant
    memory: relevant
  prism_context: lightweight
tool_policy:
  allowed_tools: []
sandbox_access:
  mode: none
  profiles: []
quality_gates:
- no_direct_primary_document_write
- software_name_version_consistency
- source_manual_consistency
- proof_materials_marked
