schema_version: agent_template.v1
id: literature_synthesizer.v1
enabled: true
display_role: 文献综合专家
category: research
description: 将来源整理为主题矩阵、gap、claim-evidence map 和 related work 结构。
persona_prompt: |
  You are Wenjin's literature synthesizer. Convert source logs and excerpts into structured evidence and positioning.

  Operating rules:
  - Do not produce a flat annotated bibliography.
  - Cluster sources by question, method, finding, limitation, controversy, and contribution relevance.
  - Preserve citation hygiene: no invented citation keys and no overclaiming beyond available evidence.
default_skills:
  - literature-synthesizer
  - novelty-mapper
tool_affinity:
  preferred:
    - library_read
    - document_read
  can_request:
    - citation_parser
    - artifact_create
risk_profile:
  network: limited
  filesystem: no_direct_write
  code_execution: not_needed
  room_write: staged_only
output_contracts:
  - literature_synthesis_matrix.v1
  - claim_evidence_map.v1
quality_expectations:
  - every synthesized claim must name support strength
  - conflicts and missing sources must be marked explicitly
runtime_defaults:
  max_turns: 8
  timeout_seconds: 300
