schema_version: mission_policy.v1
id: software_copyright_application
version: 1
workspace_type: software_copyright
enabled: true
visibility: route_hint
display:
  name: 软件著作权材料任务
  description: 基于真实代码、截图与权属信息生成一致的软著申请材料
routing:
  when_to_use:
    - 用户需要准备软件著作权申请、说明书、代码材料或证据检查。
    - 任务需要从代码和截图中提取真实结构并形成申请包。
  not_for:
    - 普通软件开发问答或不涉及登记材料的代码解释。
    - 论文、申报、数模或专利任务。
  positive_examples:
    - 根据这个项目整理软著申请材料。
    - 检查说明书、截图和代码功能是否一致。
    - 生成可复核的软件架构与操作说明。
  negative_examples:
    - 这个 Python 报错怎么修？
    - 帮我写一篇 SCI 论文。
    - 生成一套虚构的软件截图。
mission:
  objective: Produce a non-fabricated, internally consistent and reviewable software copyright package.
  target_outcomes: [evidence_inventory, architecture_pack, evidence_map, application_pack]
  hard_constraints:
    - Software identity, ownership, code and screenshots come from user or verified artifacts.
    - Generated diagrams and descriptions must match supplied software.
    - Application documents remain reviewable before save.
  forbidden_outcomes: [fabricated_screenshot, fabricated_module, invented_ownership, direct_workspace_write]
execution_budget:
  max_model_calls: 80
  max_tool_operations: 160
  max_subagent_jobs: 20
  stop_after_total_tokens: 4000000
minimum_context:
  software_materials:
    requirement: required
    ask: 请先提供软件名称、版本和可核验的代码、截图或说明材料。
  ownership_information:
    requirement: optional
  target_template:
    requirement: optional
stage_contract_refs:
  - {contract_id: software_copyright_application.materials_inventory, schema_version: stage_acceptance_contract.v2, sha256: a3e2df4f15ebf185751b644327a15185f81471d3645cdf5bcaae4264781ad507}
  - {contract_id: software_copyright_application.architecture_description, schema_version: stage_acceptance_contract.v2, sha256: e19ecc5d23e4f80106c7bb0c959faf45877429d84a34b6cb9b3f228144b6ecd4}
  - {contract_id: software_copyright_application.evidence_alignment, schema_version: stage_acceptance_contract.v2, sha256: dde53a5fda4ef6e60eefb791684c02ec9e3f59a1f020ba33e1fe181243a8ad3b}
  - {contract_id: software_copyright_application.application_pack, schema_version: stage_acceptance_contract.v2, sha256: f4cfaf8c1b9819cc36d95ea52c951d361be108f3944451f6c7cff9ebd899c14d}
tool_policy:
  allowed_tool_groups: [workspace_read, artifact_candidate_read, source_code_read, sandbox_compute, sandbox_read, artifact_render, academic_visual_render, draft_stage]
  denied_tools: [room_direct_write, unrestricted_shell, synthetic_screenshot_generation]
allowed_worker_skills: [task-scope-planner, software-documenter, academic-visual-engineer, compliance-auditor, quality-critic]
review_policy:
  default_mode: balanced_default
  allowed_modes: [review_all, balanced_default, auto_draft]
  non_bypassable_risks: [citation, claim, evidence, statistics, reproducibility, prism_structure, patent_claim, long_term_memory, visual_output]
sandbox_policy_ref: {policy_id: sandbox.software_evidence, version: 1}
examples:
  - example_id: software_copyright.pack.excellent.v1
    input_summary: 从真实代码结构、运行截图和权属事实形成一致申请包
    expected_characteristics: [功能可追溯到代码, 截图有版本来源, 文档字段跨文件一致, 未知事实明确待用户确认]
anti_examples:
  - description: 为了补齐材料而虚构模块、功能、截图或开发日期。
    failure_reason: 破坏申请材料真实性和证据链。
completion_contract:
  default_target: full_application
  targets:
    architecture_pack:
      stage_ids: [materials_inventory, architecture_description]
      terminal_output_kinds: [software_architecture_pack]
    evidence_pack:
      stage_ids: [materials_inventory, architecture_description, evidence_alignment]
      terminal_output_kinds: [software_evidence_map]
    full_application:
      stage_ids: [materials_inventory, architecture_description, evidence_alignment, application_pack]
      terminal_output_kinds: [software_copyright_pack]
  allow_safe_partial_outputs: true
delivery_profile_refs:
  - {profile_id: software_copyright_cn_application, version: 1}
