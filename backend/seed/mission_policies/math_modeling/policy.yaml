schema_version: mission_policy.v1
id: math_modeling_solution
version: 1
workspace_type: math_modeling
enabled: true
visibility: route_hint
display:
  name: 数学建模求解任务
  description: 读取赛题和数据，逐问建模、求解、验收后整合论文
routing:
  when_to_use:
    - 用户提供数学建模赛题、题面截图、PDF、数据附件或问题文本。
    - 任务需要逐问建模、脚本求解、稳健性分析、图表和竞赛论文。
  not_for:
    - 仅解释一个公式、算法或数学概念。
    - SCI、学位论文、申报、软著或专利任务。
  positive_examples:
    - 我上传了数模赛题 PDF 和数据，请逐问完成。
    - 先把第一问模型和验证做扎实，再继续第二问。
    - 基于可复现脚本生成图表并整合成国赛论文。
  negative_examples:
    - 解释一下线性规划。
    - 帮我算一道普通微积分题。
    - 不看题目和数据，直接生成一篇数模论文。
mission:
  objective: Produce reproducible, sequentially validated solutions and a reviewable modeling paper.
  target_outcomes: [problem_brief, validated_question_solutions, figures_tables, modeling_paper]
  hard_constraints:
    - A later question cannot start until the previous question's validation stage passes.
    - Computed results require scripts, input refs, parameters, manifests and robustness checks.
    - Figures and conclusions must trace to computed data; generated data imagery is forbidden.
  forbidden_outcomes: [fabricated_data, skipped_question_gate, non_reproducible_result, misleading_figure, direct_workspace_write]
minimum_context:
  problem_statement:
    requirement: required
    ask: 请先上传或粘贴完整赛题题面；如果有数据附件也一起提供。
  data_assets:
    requirement: optional
  competition_rules:
    requirement: optional
stage_contract_refs:
  - {contract_id: math_modeling_solution.problem_understanding, schema_version: stage_acceptance_contract.v2, sha256: b9932d0758e3f5189ef1c13fffc4d81cc237cbfadb1f4c51f6e62d135a440bdb}
  - {contract_id: math_modeling_solution.question_model, schema_version: stage_acceptance_contract.v2, sha256: 7a0492c0ccbc67c1da518bed0597a26db59b5466c942c699507a501f1af68cb6}
  - {contract_id: math_modeling_solution.question_solution_validation, schema_version: stage_acceptance_contract.v2, sha256: df5886dc220cdac35671059a4bc8988278b44e2e58496142733e14108a373745}
  - {contract_id: math_modeling_solution.paper_integration, schema_version: stage_acceptance_contract.v2, sha256: a06058b34c707b622f7f33a1d3a94d7fa4699dc26385f88419288db631ef1c49}
tool_policy:
  allowed_tool_groups: [workspace_read, artifact_candidate_read, sandbox_compute, sandbox_read, artifact_render, academic_visual_render, source_import, draft_stage]
  denied_tools: [room_direct_write, unrestricted_shell, synthetic_data_figure]
allowed_worker_skills: [task-scope-planner, methodology-designer, experiment-analyst, reproducibility-auditor, academic-visual-engineer, manuscript-writer, compliance-auditor, quality-critic]
review_policy:
  default_mode: balanced_default
  allowed_modes: [review_all, balanced_default, auto_draft]
  non_bypassable_risks: [citation, claim, evidence, statistics, reproducibility, prism_structure, patent_claim, long_term_memory, visual_output]
sandbox_policy_ref: {policy_id: sandbox.math_modeling, version: 1}
examples:
  - example_id: math_modeling.question_solution.excellent.v1
    input_summary: 针对单个赛题问题给出可复现、可解释且经过稳健性验证的完整解答
    expected_characteristics:
      - 变量假设和方程定义完整
      - 脚本数据参数与结果可追溯
      - 误差敏感性和图表共同支持结论
anti_examples:
  - description: 第一问只有一个数字和解释性文字，就直接开始第二问。
    failure_reason: 缺少模型、脚本、稳健性和图表证据，逐问门未通过。
completion_contract:
  default_target: full_paper
  targets:
    validated_questions:
      stage_ids: [problem_understanding, question_model, question_solution_validation]
      terminal_output_kinds: [question_solution]
    full_paper:
      stage_ids: [problem_understanding, question_model, question_solution_validation, paper_integration]
      terminal_output_kinds: [math_modeling_paper]
  allow_safe_partial_outputs: true
delivery_profile_refs:
  - {profile_id: math_modeling_cumcm2026, version: 1}
