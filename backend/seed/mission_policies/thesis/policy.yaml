schema_version: mission_policy.v1
id: thesis_research
version: 1
workspace_type: thesis
enabled: true
visibility: route_hint
display:
  name: 学位论文研究任务
  description: 按学校要求推进选题、文献框架、方法与章节写作
routing:
  when_to_use:
    - 用户需要推进本科或硕士学位论文的研究与写作。
    - 任务需要承接学校规范、已有章节、数据与长期修改状态。
  not_for:
    - 仅解释知识点或修改一句话。
    - SCI 投稿、数学建模、专利、软著或项目申报任务。
  positive_examples:
    - 帮我把这个选题发展成可执行的硕士论文方案。
    - 基于学校模板和已有文献规划论文结构。
    - 检查并重写这章，让论证和引用更扎实。
  negative_examples:
    - 解释一下结构方程模型。
    - 把这句话改得正式一点。
    - 帮我写专利权利要求。
mission:
  objective: Produce a school-compliant, evidence-grounded and coherent thesis at the requested stage.
  target_outcomes: [thesis_scope, chapter_evidence_map, methodology, thesis_draft]
  hard_constraints:
    - School and degree constraints are explicit inputs, never guessed.
    - Every chapter claim retains evidence responsibility.
    - Structural and citation-bearing changes require review.
  forbidden_outcomes: [invented_school_rule, fabricated_citation, unsupported_chapter, direct_workspace_write]
execution_budget:
  max_model_calls: 160
  max_tool_operations: 320
  max_subagent_jobs: 40
  stop_after_total_tokens: 10000000
minimum_context:
  thesis_topic:
    requirement: required
    ask: 你的论文主题或当前研究问题是什么？
  school_requirements:
    requirement: optional
  existing_draft:
    requirement: optional
stage_contract_refs:
  - {contract_id: thesis_research.scope, schema_version: stage_acceptance_contract.v2, sha256: 64b62eb9eaef4a55e6042f164acccb9043bf66c2316e347c577b700ed57bd8fe}
  - {contract_id: thesis_research.literature_framework, schema_version: stage_acceptance_contract.v2, sha256: 58c995c63d9bd7dd45f2f5f6cee1a7075733696167b9de279b3e6e392b5bfcea}
  - {contract_id: thesis_research.method_design, schema_version: stage_acceptance_contract.v2, sha256: 798ea904614122ef51e3fa3c96fb3cbebcdda6aeb5622a3ab49f65b4157d36a5}
  - {contract_id: thesis_research.chapter_writing, schema_version: stage_acceptance_contract.v2, sha256: ebd4f279b28346dd0959e92ed8187ce4924e23357843abebce7c0da58f78ab8a}
tool_policy:
  allowed_tool_groups: [workspace_read, artifact_candidate_read, model_native_web_search, source_import, sandbox_compute, sandbox_read, artifact_render, academic_visual_render, draft_stage]
  denied_tools: [room_direct_write, unrestricted_shell]
allowed_worker_skills: [task-scope-planner, research-scout, evidence-synthesizer, methodology-designer, experiment-analyst, academic-visual-engineer, manuscript-writer, citation-auditor, quality-critic]
review_policy:
  default_mode: balanced_default
  allowed_modes: [review_all, balanced_default, auto_draft]
  non_bypassable_risks: [citation, claim, evidence, statistics, reproducibility, prism_structure, patent_claim, long_term_memory, visual_output]
sandbox_policy_ref: {policy_id: sandbox.research, version: 1}
examples:
  - example_id: thesis.chapter.excellent.v1
    input_summary: 在学校规范和证据地图约束下完成一个论证闭合的章节
    expected_characteristics: [章节问题明确, 论断均有来源, 与全文主线一致, 修改可逐项复核]
anti_examples:
  - description: 按目录批量生成流畅但没有证据责任的章节。
    failure_reason: 内容无法验证，也无法证明对论文主问题的贡献。
completion_contract:
  default_target: research_plan
  targets:
    research_plan:
      stage_ids: [scope, literature_framework, method_design]
      terminal_output_kinds: [methodology_plan]
    chapter_draft:
      stage_ids: [scope, literature_framework, method_design, chapter_writing]
      terminal_output_kinds: [thesis_draft]
  allow_safe_partial_outputs: true
delivery_profile_refs:
  - {profile_id: thesis_school_template, version: 1}
