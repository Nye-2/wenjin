# Wenjin Configuration

tools:
  - use: src.tools.builtins.clarification:ask_clarification_tool
    group: interaction
  - use: src.tools.builtins.artifacts:present_files_tool
    group: output
  - use: src.tools.builtins.references:search_reference_text_units_tool
    group: academic

tool_groups:
  interaction:
    description: User interaction tools
  output:
    description: Output presentation tools
  academic:
    description: Academic research tools

middlewares:
  summarization:
    enabled: true
    trigger: "tokens:80000"
    keep: "messages:10"
  title:
    enabled: true
    max_words: 6
    max_chars: 40
  academic:
    workspace_context: true
    literature_context: true
    knowledge_context: true
    discipline_context: true
    citation_tracking: true

memory:
  enabled: true
  debounce_seconds: 30
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

database:
  url: $DATABASE_URL
  echo: false

redis:
  url: $REDIS_URL

billing:
  thread:
    enabled: true
    free_tokens: 100000
    tokens_per_credit: 10000
    max_overdraft_credits: 100
  mission:
    enabled: true
    free_tokens: 0
    tokens_per_credit: 10000
    max_overdraft_credits: 100
  sandbox:
    enabled: true
    run_python_credits: 1
    max_overdraft_credits: 100
