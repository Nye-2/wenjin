# Alembic configuration file

[alembic]
# Path to migration scripts
script_location = alembic

# Prepend sys.path
prepend_sys_path = .

# Timezone for revision timestamp
timezone = UTC

# Truncate revision id
truncate_slug_length = 40

# Set to 'true' for offline mode
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# No hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
