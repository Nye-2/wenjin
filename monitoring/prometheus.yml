global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "wenjin-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gateway:8001"]
  - job_name: "wenjin-worker"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["worker:9153"]
