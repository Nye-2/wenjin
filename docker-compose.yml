# 问津 Wenjin - Docker Compose Configuration
# Production deployment on port 2026.
#
# Default deployment uses prebuilt images. Local rebuilds are explicit:
#   docker compose -f docker-compose.yml -f docker-compose.local-build.yml up -d --build

# TeXLive image build config (manual build only: docker build -t wenjin/texlive:2024 backend/docker/images/texlive)
# x-texlive-build: &texlive_build
#   context: ./backend/docker/images/texlive
#   dockerfile: Dockerfile
#   args:
#     BASE_IMAGE: ${TEXLIVE_BASE_IMAGE:-ubuntu:22.04}
#     APT_MIRROR: ${TEXLIVE_APT_MIRROR:-}

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: wenjin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: wenjin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wenjin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wenjin-network

  # Redis 8 with AOF persistence (REQUIRED)
  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    container_name: wenjin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wenjin-network

  # One-shot TeXLive image bootstrap for LaTeX compilation runtime.
  # Build manually: docker build -t wenjin/texlive:2024 backend/docker/images/texlive
  # Or pull from Docker Hub: docker pull <username>/wenjin-texlive:2024
  texlive:
    image: ${TEXLIVE_IMAGE_NAME:-junze0514/wenjin-texlive:2024}
    container_name: wenjin-texlive
    restart: "no"
    command:
      [
        "sh",
        "-lc",
        "xelatex --version >/dev/null && pdflatex --version >/dev/null && biber --version >/dev/null && kpsewhich listings.sty >/dev/null && kpsewhich ctexart.cls >/dev/null",
      ]
    networks:
      - wenjin-network

  # FastAPI Gateway Service
  migrate:
    image: ${BACKEND_GATEWAY_IMAGE:-junze0514/wenjin-backend:latest}
    container_name: wenjin-migrate
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    command: ["python", "-m", "src.database.migration_bootstrap"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - wenjin-network

  # Bootstrap Admin User (runs once after migration)
  bootstrap-admin:
    image: ${BACKEND_GATEWAY_IMAGE:-junze0514/wenjin-backend:latest}
    container_name: wenjin-bootstrap-admin
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - DATASERVICE_URL=http://dataservice:8080
      - DATASERVICE_INTERNAL_TOKEN=${DATASERVICE_INTERNAL_TOKEN:?DATASERVICE_INTERNAL_TOKEN must be set}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@wenjin.ai}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
    command: ["python", "-m", "src.database.bootstrap_admin"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      dataservice:
        condition: service_healthy
    restart: "no"
    networks:
      - wenjin-network

  # DataService owns canonical data access and transaction boundaries.
  dataservice:
    image: ${BACKEND_DATASERVICE_IMAGE:-junze0514/wenjin-backend:latest}
    container_name: wenjin-dataservice
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - DATASERVICE_URL=http://dataservice:8080
      - DATASERVICE_INTERNAL_TOKEN=${DATASERVICE_INTERNAL_TOKEN:?DATASERVICE_INTERNAL_TOKEN must be set}
    command: ["python", "-m", "uvicorn", "src.dataservice_app.app:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - wenjin-network

  # FastAPI Gateway Service
  gateway:
    image: ${BACKEND_GATEWAY_IMAGE:-junze0514/wenjin-backend:latest}
    container_name: wenjin-gateway
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_STREAM_MAX_CONNECTIONS=${REDIS_STREAM_MAX_CONNECTIONS:-200}
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8001
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
      - DATASERVICE_URL=http://dataservice:8080
      - DATASERVICE_INTERNAL_TOKEN=${DATASERVICE_INTERNAL_TOKEN:?DATASERVICE_INTERNAL_TOKEN must be set}
      - WENJIN_LATEX_DATA_DIR=${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin/latex_projects
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
      - ./backend/extensions_config.json:/app/extensions_config.json
      - ${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin:${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      bootstrap-admin:
        condition: service_completed_successfully
      dataservice:
        condition: service_healthy
      worker:
        condition: service_healthy
      texlive:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/models?purpose=chat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wenjin-network

  worker:
    image: ${BACKEND_GATEWAY_IMAGE:-junze0514/wenjin-backend:latest}
    container_name: wenjin-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_STREAM_MAX_CONNECTIONS=${REDIS_STREAM_MAX_CONNECTIONS:-200}
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
      - PROMETHEUS_WORKER_PORT=${PROMETHEUS_WORKER_PORT:-9153}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/wenjin-prometheus-worker
      - DATASERVICE_URL=http://dataservice:8080
      - DATASERVICE_INTERNAL_TOKEN=${DATASERVICE_INTERNAL_TOKEN:?DATASERVICE_INTERNAL_TOKEN must be set}
      - WENJIN_LATEX_DATA_DIR=${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin/latex_projects
    command: ["python", "-m", "src.task.worker", "1", "--queues", "long_running,default,priority"]
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
      - ./backend/extensions_config.json:/app/extensions_config.json:ro
      - ${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin:${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      bootstrap-admin:
        condition: service_completed_successfully
      dataservice:
        condition: service_healthy
      texlive:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${PROMETHEUS_WORKER_PORT:-9153}/metrics >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wenjin-network

  memory-worker:
    image: ${BACKEND_GATEWAY_IMAGE:-junze0514/wenjin-backend:latest}
    container_name: wenjin-memory-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_STREAM_MAX_CONNECTIONS=${REDIS_STREAM_MAX_CONNECTIONS:-200}
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
      - PROMETHEUS_WORKER_PORT=${PROMETHEUS_MEMORY_WORKER_PORT:-9153}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/wenjin-prometheus-memory-worker
      - DATASERVICE_URL=http://dataservice:8080
      - DATASERVICE_INTERNAL_TOKEN=${DATASERVICE_INTERNAL_TOKEN:?DATASERVICE_INTERNAL_TOKEN must be set}
    command: ["python", "-m", "src.task.worker", "1", "--queues", "memory"]
    depends_on:
      bootstrap-admin:
        condition: service_completed_successfully
      dataservice:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${PROMETHEUS_MEMORY_WORKER_PORT:-9153}/metrics >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wenjin-network

  # LangGraph Agent Server
  langgraph:
    profiles: ["langgraph"]
    image: ${LANGGRAPH_IMAGE:-junze0514/wenjin-langgraph:latest}
    container_name: wenjin-langgraph
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/wenjin
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_STREAM_MAX_CONNECTIONS=${REDIS_STREAM_MAX_CONNECTIONS:-200}
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LANGGRAPH_HOST=0.0.0.0
      - LANGGRAPH_PORT=2024
      - DATASERVICE_URL=http://dataservice:8080
      - DATASERVICE_INTERNAL_TOKEN=${DATASERVICE_INTERNAL_TOKEN:?DATASERVICE_INTERNAL_TOKEN must be set}
      - WENJIN_LATEX_DATA_DIR=${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin/latex_projects
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
      - ./backend/extensions_config.json:/app/extensions_config.json:ro
      - ${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin:${WENJIN_PROJECT_DIR:-/home/cjz/wenjin}/backend/.wenjin
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      dataservice:
        condition: service_healthy
      texlive:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2024/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wenjin-network

  # Next.js Frontend
  frontend:
    image: ${FRONTEND_IMAGE:-junze0514/wenjin-frontend:latest}
    container_name: wenjin-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - wenjin-network

  # Nginx Reverse Proxy
  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    container_name: wenjin-nginx
    restart: unless-stopped
    ports:
      - "2026:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/api/models?purpose=chat >/dev/null && wget -qO- http://frontend:3000 >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wenjin-network

  # Prometheus metrics collection (Sprint 2)
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: wenjin-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - wenjin-network

  # Grafana dashboards (Sprint 2)
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: wenjin-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    networks:
      - wenjin-network

networks:
  wenjin-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
