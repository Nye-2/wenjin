# AcademiaGPT v2 - Docker Compose Configuration
# Production deployment on port 2026

x-backend-gateway-build: &backend_gateway_build
  context: ./backend
  dockerfile: Dockerfile
  target: gateway
  args:
    PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}

x-langgraph-build: &langgraph_build
  context: ./backend
  dockerfile: Dockerfile
  target: langgraph
  args:
    PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}

x-frontend-build: &frontend_build
  context: ./frontend
  dockerfile: Dockerfile
  args:
    NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: academiagpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: academiagpt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academiagpt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - academiagpt-network

  # Redis 7 with AOF persistence (REQUIRED)
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: academiagpt-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - academiagpt-network

  # FastAPI Gateway Service
  migrate:
    image: ${BACKEND_GATEWAY_IMAGE:-academiagpt-v2-backend}
    build: *backend_gateway_build
    container_name: academiagpt-migrate
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - REDIS_URL=redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "src.database.migration_bootstrap"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - academiagpt-network

  # Bootstrap Admin User (runs once after migration)
  bootstrap-admin:
    image: ${BACKEND_GATEWAY_IMAGE:-academiagpt-v2-backend}
    build: *backend_gateway_build
    container_name: academiagpt-bootstrap-admin
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@academiagpt.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
    command: ["uv", "run", "python", "-m", "src.database.bootstrap_admin"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - academiagpt-network

  # FastAPI Gateway Service
  gateway:
    image: ${BACKEND_GATEWAY_IMAGE:-academiagpt-v2-backend}
    build: *backend_gateway_build
    container_name: academiagpt-gateway
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - REDIS_URL=redis://redis:6379/0
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8001
      - LANGGRAPH_URL=http://langgraph:2024
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
      - ./backend/extensions_config.json:/app/extensions_config.json
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      bootstrap-admin:
        condition: service_completed_successfully
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academiagpt-network

  worker:
    image: ${BACKEND_GATEWAY_IMAGE:-academiagpt-v2-backend}
    build: *backend_gateway_build
    container_name: academiagpt-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - REDIS_URL=redis://redis:6379/0
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
    command: ["python", "-m", "src.task.worker"]
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
      - ./backend/extensions_config.json:/app/extensions_config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      bootstrap-admin:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from src.task import celery_app; import sys; inspect = celery_app.control.inspect(timeout=2); sys.exit(0 if inspect.ping() else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academiagpt-network

  # LangGraph Agent Server
  langgraph:
    image: ${LANGGRAPH_IMAGE:-academiagpt-v2-langgraph}
    build: *langgraph_build
    container_name: academiagpt-langgraph
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - REDIS_URL=redis://redis:6379/0
      - CELERY_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - LANGGRAPH_HOST=0.0.0.0
      - LANGGRAPH_PORT=2024
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
      - ./backend/extensions_config.json:/app/extensions_config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2024/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academiagpt-network

  # Next.js Frontend
  frontend:
    image: ${FRONTEND_IMAGE:-academiagpt-v2-frontend}
    build: *frontend_build
    container_name: academiagpt-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_LANGGRAPH_BASE_URL=/langgraph
      - NEXT_PUBLIC_API_URL=/api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
      langgraph:
        condition: service_healthy
    networks:
      - academiagpt-network

  # Nginx Reverse Proxy
  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    container_name: academiagpt-nginx
    restart: unless-stopped
    ports:
      - "2026:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
      langgraph:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/readyz >/dev/null && wget -qO- http://frontend:3000 >/dev/null && wget -qO- http://langgraph:2024/info >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - academiagpt-network

  # Prometheus metrics collection (Sprint 2)
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: academiagpt-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - academiagpt-network

  # Grafana dashboards (Sprint 2)
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: academiagpt-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    networks:
      - academiagpt-network

networks:
  academiagpt-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
