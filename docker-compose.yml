# AcademiaGPT v2 - Docker Compose Configuration
# Production deployment on port 2026

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: academiagpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: academiagpt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academiagpt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - academiagpt-network

  # Redis 7 with AOF persistence (REQUIRED)
  redis:
    image: redis:7-alpine
    container_name: academiagpt-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - academiagpt-network

  # FastAPI Gateway Service
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: gateway
    container_name: academiagpt-gateway
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8001
      - LANGGRAPH_URL=http://langgraph:2024
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academiagpt-network

  # LangGraph Agent Server
  langgraph:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: langgraph
    container_name: academiagpt-langgraph
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/academiagpt
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - LANGGRAPH_HOST=0.0.0.0
      - LANGGRAPH_PORT=2024
    volumes:
      - uploads:/app/uploads
      - ./backend/skills:/app/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2024/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academiagpt-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academiagpt-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_LANGGRAPH_BASE_URL=/langgraph
      - NEXT_PUBLIC_BACKEND_BASE_URL=/api
    depends_on:
      - gateway
      - langgraph
    networks:
      - academiagpt-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: academiagpt-nginx
    restart: unless-stopped
    ports:
      - "2026:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - academiagpt-network

networks:
  academiagpt-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
